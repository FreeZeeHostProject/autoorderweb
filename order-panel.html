<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configure Server | FreeZeeHosting</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                    },
                    colors: { brand: '#00f2fe', dark: '#000000' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; color: #ffffff; overflow-x: hidden; }
        
        .grid-bg-static {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.01) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -2;
        }
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), black 0%, transparent 50%);
            -webkit-mask-image: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), black 0%, transparent 50%);
            z-index: -1;
        }
        .glow-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.05) 0%, transparent 50%); z-index: -1; }

        .custom-input { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 0; padding: 0.5rem 0; transition: all 0.3s; }
        .custom-input:focus { border-bottom-color: #00f2fe; outline: none; }

        .selection-item { cursor: pointer; transition: all 0.3s ease; opacity: 0.3; filter: grayscale(1); position: relative; z-index: 10; }
        .selection-item:hover { opacity: 0.6; transform: translateY(-2px); }
        .radio-hidden:checked + .selection-item { opacity: 1 !important; filter: grayscale(0) !important; transform: scale(1.05); text-shadow: 0 0 15px rgba(0, 242, 254, 0.4); }
        .radio-hidden:checked + .selection-item i { color: #00f2fe; }

        .btn-action { background: #fff; color: #000; font-weight: 900; transition: all 0.3s; }
        .btn-action:hover { box-shadow: 0 0 25px rgba(0, 242, 254, 0.3); transform: scale(1.02); }
        .btn-action:disabled { background: #1e293b; color: #475569; }

        .step-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.1); transition: all 0.4s; }
        .step-dot.active { background: #00f2fe; box-shadow: 0 0 10px #00f2fe; transform: scale(1.3); }

        .section-hidden { opacity: 0; pointer-events: none; height: 0; overflow: hidden; transform: translateY(10px); transition: all 0.5s ease; }
        .section-visible { opacity: 1; pointer-events: auto; height: auto; transform: translateY(0); transition: all 0.5s ease; }
    </style>
</head>
<body class="antialiased">

    <div class="grid-bg-static"></div>
    <div class="grid-bg"></div>
    <div class="glow-overlay"></div>

    <nav class="fixed w-full z-50 py-6 bg-black/40 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-6xl mx-auto px-8 flex justify-between items-center">
            <a href="index.html" class="font-display text-lg font-bold tracking-tighter flex items-center gap-2">
                <i class="fa-solid fa-snowflake text-brand"></i>
                <span>FreeZee<span class="text-brand">Hosting</span></span>
            </a>
            <div class="flex gap-2" id="step-indicator">
                <div class="step-dot active"></div><div class="step-dot"></div><div class="step-dot"></div><div class="step-dot"></div>
            </div>
        </div>
    </nav>

    <main class="min-h-screen pt-32 pb-48 px-6">
        <div class="max-w-3xl mx-auto">
            <form id="orderForm" class="space-y-24">
                
                <!-- STEP 1: INFRA -->
                <section id="step1">
                    <div class="text-[9px] font-black text-brand uppercase tracking-[0.3em] mb-4">01. Infrastructure</div>
                    <h2 class="text-3xl md:text-4xl font-extrabold mb-8 tracking-tight">Pilih Pondasi Server.</h2>
                    <div class="grid grid-cols-2 gap-8">
                        <label>
                            <input type="radio" name="infra_type" value="legal" class="hidden radio-hidden" onchange="refreshAll()" checked>
                            <div class="selection-item">
                                <i class="fa-solid fa-shield-check text-2xl mb-4"></i>
                                <div class="text-lg font-bold mb-1">VPS Legal</div>
                                <p class="text-[10px] text-white/30 uppercase font-bold">Murni & Stabil</p>
                            </div>
                        </label>
                        <label>
                            <input type="radio" name="infra_type" value="do" class="hidden radio-hidden" onchange="refreshAll()">
                            <div class="selection-item">
                                <i class="fa-brands fa-digital-ocean text-2xl mb-4"></i>
                                <div class="text-lg font-bold mb-1">VPS D.O</div>
                                <p class="text-[10px] text-white/30 uppercase font-bold">Global Speed</p>
                            </div>
                        </label>
                    </div>
                </section>

                <!-- STEP 2: CATEGORY -->
                <section id="step2">
                    <div class="text-[9px] font-black text-brand uppercase tracking-[0.3em] mb-4">02. Category</div>
                    <h2 class="text-3xl md:text-4xl font-extrabold mb-8 tracking-tight">Tentukan Layanan.</h2>
                    <div class="grid grid-cols-3 md:grid-cols-5 gap-6 text-center" id="categoryContainer"></div>
                </section>

                <!-- STEP 3: EGG -->
                <section id="eggSection" class="section-hidden">
                    <div class="text-[9px] font-black text-brand uppercase tracking-[0.3em] mb-4">03. Specification</div>
                    <h2 class="text-3xl md:text-4xl font-extrabold mb-8 tracking-tight">Pilih Software.</h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 text-center" id="eggContainer"></div>
                </section>

                <!-- STEP 4: PACKAGE -->
                <section id="packageSection" class="section-hidden">
                    <div class="text-[9px] font-black text-brand uppercase tracking-[0.3em] mb-4">04. Capacity</div>
                    <h2 class="text-3xl md:text-4xl font-extrabold mb-8 tracking-tight">Besaran RAM.</h2>
                    <div class="grid grid-cols-3 md:grid-cols-4 gap-6 text-center" id="packageContainer"></div>
                </section>

                <!-- STEP 5: CONTACT -->
                <section id="contactSection" class="section-hidden">
                    <div class="text-[9px] font-black text-brand uppercase tracking-[0.3em] mb-4">05. Personal Data</div>
                    <h2 class="text-3xl md:text-4xl font-extrabold mb-8 tracking-tight">Detail Pengiriman.</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <input type="email" id="userEmail" placeholder="Email Address" class="custom-input text-xl font-bold">
                        <input type="text" id="userWa" placeholder="WhatsApp Number" class="custom-input text-xl font-bold">
                    </div>
                </section>

            </form>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full z-[60] py-6 border-t border-white/5 bg-black/90 backdrop-blur-xl">
        <div class="max-w-6xl mx-auto px-10 flex flex-col md:flex-row items-center justify-between gap-6">
            <div>
                <div class="text-[8px] font-black text-white/30 uppercase tracking-[0.2em] mb-1 text-center md:text-left">Estimated Total</div>
                <div class="text-3xl font-extrabold tracking-tighter" id="totalPriceDisplay">Rp 0</div>
            </div>
            <button id="btnBayar" onclick="processCheckout()" class="btn-action px-12 py-4 rounded-full text-[10px] font-black uppercase tracking-widest flex items-center gap-3">
                CHECKOUT <i class="fa-solid fa-arrow-right text-[8px]"></i>
            </button>
        </div>
    </div>

    <div id="customAlertModal" class="fixed inset-0 z-[100] flex items-center justify-center px-6 opacity-0 pointer-events-none transition-all duration-500">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-md"></div>
        <div class="relative text-center max-w-sm">
            <h3 id="alertTitle" class="text-2xl font-extrabold mb-2 text-white"></h3>
            <p id="alertMsg" class="text-white/40 text-xs mb-8"></p>
            <button onclick="closeAlert()" class="w-full py-3 border border-white/10 rounded-full text-[9px] font-black uppercase tracking-widest text-white">OKE</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const DATA = {
            categories: [
                { id: 'minecraft', label: 'Minecraft', icon: 'fa-cube', nest: 1 },
                { id: 'source', label: 'Source', icon: 'fa-gun', nest: 2 },
                { id: 'voice', label: 'Voice', icon: 'fa-microphone', nest: 3 },
                { id: 'rust', label: 'Rust', icon: 'fa-radiation', nest: 4 },
                { id: 'bot', label: 'Bot', icon: 'fa-robot', nest: 5 }
            ],
            eggs: {
                minecraft: [{id:1, label:'Forge'}, {id:2, label:'Paper'}, {id:3, label:'Vanilla'}, {id:4, label:'Bungeecord'}, {id:5, label:'Sponge'}],
                source: [{id:6, label:'TF 2'}, {id:7, label:'Custom'}, {id:8, label:'Garrys Mod'}, {id:9, label:'CS:GO'}, {id:10, label:'Insurgency'}, {id:11, label:'Ark'}],
                voice: [{id:12, label:'TeamSpeak'}, {id:13, label:'Mumble'}],
                rust: [{id:14, label:'Rust Default'}],
                bot: [{id:15, label:'Bot WA (JS)'}, {id:16, label:'Bot WA (Py)'}]
            },
            pricing: []
        };

        // Build 1GB - 10GB + Unlimited
        for(let i=1; i<=10; i++) {
            DATA.pricing.push({ label: i + 'GB RAM', ram: i, do: i * 1000, legal: i * 1500 });
        }
        DATA.pricing.push({ label: 'Unlimited', ram: 0, do: 15000, legal: 15000 });

        let currentOrder = { infra: 'legal', category: '', egg: null, package: null };

        window.onload = () => { renderCategories(); checkServerStatus(); };

        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = DATA.categories.map(cat => `
                <label>
                    <input type="radio" name="cat" value="${cat.id}" class="hidden radio-hidden" onchange="selectCategory('${cat.id}')">
                    <div class="selection-item text-center">
                        <i class="fa-solid ${cat.icon} text-xl mb-3"></i>
                        <div class="text-[8px] font-black uppercase tracking-widest">${cat.label}</div>
                    </div>
                </label>`).join('');
        }

        function selectCategory(id) {
            currentOrder.category = id;
            currentOrder.egg = null;
            currentOrder.package = null;
            const container = document.getElementById('eggContainer');
            container.innerHTML = DATA.eggs[id].map(egg => `
                <label>
                    <input type="radio" name="egg" value="${egg.id}" class="hidden radio-hidden" onchange="selectEgg(${egg.id}, '${egg.label}')">
                    <div class="selection-item text-center">
                        <div class="text-[9px] font-black uppercase tracking-widest">${egg.label}</div>
                    </div>
                </label>`).join('');
            
            const section = document.getElementById('eggSection');
            section.className = "section-visible";
            updateDots(2);
            setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
        }

        function selectEgg(id, label) {
            currentOrder.egg = { id, label };
            currentOrder.package = null;
            const container = document.getElementById('packageContainer');
            const infra = document.querySelector('input[name="infra_type"]:checked').value;
            container.innerHTML = DATA.pricing.map((pkg, i) => `
                <label>
                    <input type="radio" name="pkg" value="${i}" class="hidden radio-hidden" onchange="selectPackage(${i})">
                    <div class="selection-item text-center">
                        <div class="text-sm font-bold mb-1">${pkg.label}</div>
                        <div class="text-[8px] text-white/30 font-bold">Rp ${pkg[infra].toLocaleString('id-ID')}</div>
                    </div>
                </label>`).join('');
            
            const section = document.getElementById('packageSection');
            section.className = "section-visible";
            updateDots(3);
            setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
        }

        function selectPackage(i) {
            const infra = document.querySelector('input[name="infra_type"]:checked').value;
            currentOrder.package = DATA.pricing[i];
            currentOrder.price = currentOrder.package[infra];
            const section = document.getElementById('contactSection');
            section.className = "section-visible";
            updatePrice();
            updateDots(4);
            setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
        }

        function updatePrice() {
            const infra = document.querySelector('input[name="infra_type"]:checked').value;
            let p = currentOrder.package ? currentOrder.package[infra] : 0;
            document.getElementById('totalPriceDisplay').innerText = "Rp " + p.toLocaleString('id-ID');
        }

        function updateDots(step) {
            const dots = document.querySelectorAll('.step-dot');
            dots.forEach((d, i) => d.classList.toggle('active', i < step));
        }

        function refreshAll() { if(currentOrder.category) selectCategory(currentOrder.category); updatePrice(); }

        async function checkServerStatus() {
            const btn = document.getElementById('btnBayar');
            try {
                const res = await fetch('/api/check-ptero');
                const data = await res.json();
                if (data.status !== 'online') btn.disabled = true;
            } catch (e) { btn.disabled = true; }
        }

        async function processCheckout() {
            const email = document.getElementById('userEmail').value;
            const wa = document.getElementById('userWa').value;
            const infra = document.querySelector('input[name="infra_type"]:checked').value;
            if(!currentOrder.package) return showAlert("Opps", "Pilih paket RAM.");
            if(!email || !wa) return showAlert("Data Kosong", "Isi email & WA.");
            
            const btn = document.getElementById('btnBayar');
            btn.disabled = true; btn.innerHTML = "WAIT...";
            try {
                const nestId = DATA.categories.find(c => c.id === currentOrder.category).nest;
                const response = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        nominal: currentOrder.price, email, whatsapp: wa, 
                        package_name: `${currentOrder.category.toUpperCase()} - ${currentOrder.egg.label} (${currentOrder.package.label})`,
                        nest_id: nestId, egg_id: currentOrder.egg.id, infra_type: infra
                    })
                });
                const result = await response.json();
                if(result.status === 'success') window.location.href = result.checkout_url;
                else showAlert("Gagal", result.message);
            } catch (e) { showAlert("Error", "Server sibuk."); }
            finally { btn.disabled = false; btn.innerHTML = "CHECKOUT"; }
        }

        function showAlert(title, msg) {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMsg').innerText = msg;
            document.getElementById('customAlertModal').classList.remove('opacity-0', 'pointer-events-none');
        }
        function closeAlert() { document.getElementById('customAlertModal').classList.add('opacity-0', 'pointer-events-none'); }

        document.addEventListener('mousemove', e => {
            document.documentElement.style.setProperty('--mouse-x', `${(e.clientX / window.innerWidth) * 100}%`);
            document.documentElement.style.setProperty('--mouse-y', `${(e.clientY / window.innerHeight) * 100}%`);
        });
    </script>
</body>
</html>
