<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONFIGURATOR | FREEZEEHOST</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=JetBrains+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'], pixel: ['"Press Start 2P"', 'cursive'] },
                    colors: { brand: '#00f2fe', pink: '#ff00c8' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #fff; overflow-x: hidden; cursor: crosshair; }
        .chaos-card { background: rgba(10, 10, 10, 0.9); border: 2px solid rgba(255,255,255,0.1); border-radius: 3rem; padding: 3rem; backdrop-filter: blur(40px); position: relative; overflow: hidden; z-index: 100; }
        .custom-input { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); color: #00f2fe; border-radius: 1rem; padding: 1.5rem; font-family: 'JetBrains Mono'; font-weight: 700; width: 100%; transition: 0.3s; }
        .custom-input:focus { border-color: #ff00c8; outline: none; }
        .selection-item { cursor: pointer; transition: 0.3s; opacity: 0.3; filter: grayscale(1); }
        .radio-hidden { position: absolute; opacity: 0; }
        .radio-hidden:checked + .selection-item { opacity: 1; filter: grayscale(0); transform: scale(1.1); text-shadow: 0 0 20px #00f2fe; }
        .btn-action { background: #fff; color: #000; font-weight: 900; padding: 1.2rem 3rem; border-radius: 999px; border: 4px solid #fff; font-size: 12px; text-transform: uppercase; cursor: pointer; transition: 0.3s; box-shadow: 0 0 50px #00f2fe; }
        .btn-action:hover { background: #ff00c8; color: #fff; transform: scale(1.05); }
        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.1); transition: 0.4s; }
        .step-dot.active { background: #00f2fe; box-shadow: 0 0 15px #00f2fe; transform: scale(1.5); }
        #mouse-hud { position: fixed; width: 80px; height: 80px; border: 1px solid rgba(0, 242, 254, 0.5); border-radius: 50%; z-index: 10000; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body class="antialiased p-6">
    <div id="mouse-hud"></div>

    <nav class="fixed w-full z-[1500] py-8 px-6 top-0 left-0">
        <div class="max-w-6xl mx-auto flex items-center justify-between h-16 bg-black/60 backdrop-blur-2xl border border-white/10 rounded-full px-8 shadow-2xl">
            <a href="index.html" class="font-display text-xl font-bold flex items-center gap-3">
                <i class="fa-solid fa-snowflake text-brand animate-spin-slow"></i>
                <span>FreeZee<span class="text-brand">Hosting</span></span>
            </a>
            <div class="flex gap-3" id="step-indicator">
                <div class="step-dot active"></div><div class="step-dot"></div><div class="step-dot"></div><div class="step-dot"></div>
            </div>
        </div>
    </nav>

    <main class="min-h-screen pt-32 pb-48 px-6">
        <div class="max-w-4xl mx-auto">
            <div class="chaos-card border-brand shadow-[0_0_100px_rgba(0,242,254,0.1)]">
                <form id="orderForm" class="space-y-20">
                    <section id="step1">
                        <div class="text-[9px] font-pixel text-brand mb-6">01_INFRASTRUCTURE</div>
                        <h2 class="text-4xl font-black mb-10 tracking-tighter uppercase italic">Select_Core</h2>
                        <div class="grid grid-cols-2 gap-10">
                            <label class="relative block"><input type="radio" name="infra_type" value="legal" class="radio-hidden" checked onchange="refreshAll()"><div class="selection-item p-10 border-4 border-white/5 rounded-[2.5rem] text-center bg-white/5"><i class="fa-solid fa-shield-check text-4xl mb-6 text-brand"></i><div class="font-black">LEGAL_CORE</div></div></label>
                            <label class="relative block"><input type="radio" name="infra_type" value="do" class="radio-hidden" onchange="refreshAll()"><div class="selection-item p-10 border-4 border-white/5 rounded-[2.5rem] text-center bg-white/5"><i class="fa-brands fa-digital-ocean text-4xl mb-6 text-blue-500"></i><div class="font-black">D.O_CLOUD</div></div></label>
                        </div>
                    </section>

                    <section id="step2">
                        <div class="text-[9px] font-pixel text-brand mb-6">02_CATEGORY</div>
                        <h2 class="text-4xl font-black mb-10 tracking-tighter uppercase italic">Target_Service</h2>
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-6 text-center" id="categoryContainer"></div>
                    </section>

                    <section id="eggSection" class="hidden">
                        <div class="text-[9px] font-pixel text-brand mb-6">03_SOFTWARE</div>
                        <h2 class="text-4xl font-black mb-10 tracking-tighter uppercase italic">Injection_Type</h2>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 text-center" id="eggContainer"></div>
                    </section>

                    <section id="packageSection" class="hidden">
                        <div class="text-[9px] font-pixel text-brand mb-6">04_CAPACITY</div>
                        <h2 class="text-4xl font-black mb-10 tracking-tighter uppercase italic">Allocation_Size</h2>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 text-center" id="packageContainer"></div>
                    </section>

                    <section id="contactSection" class="hidden">
                        <div class="text-[9px] font-pixel text-brand mb-6">05_PERSONAL_LINK</div>
                        <h2 class="text-4xl font-black mb-10 tracking-tighter uppercase italic">Auth_Identity</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                            <input type="email" id="userEmail" placeholder="EMAIL_ADDRESS" class="custom-input text-2xl font-black">
                            <input type="text" id="userWa" placeholder="WA_PROTOCOL" class="custom-input text-2xl font-black">
                        </div>
                    </section>
                </form>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full z-[1000] py-10 border-t-4 border-brand bg-black/90 backdrop-blur-3xl shadow-[0_-50px_100px_rgba(0,0,0,0.9)]">
        <div class="max-w-6xl mx-auto px-12 flex flex-col md:row items-center justify-between gap-10">
            <div class="text-center md:text-left">
                <div class="text-[10px] font-pixel text-brand mb-2">ESTIMATED_CREDITS</div>
                <div class="text-6xl font-black tracking-tighter" id="totalPriceDisplay">Rp 0</div>
            </div>
            <button id="btnBayar" onclick="processCheckout()" class="btn-action px-20 py-6 !text-lg">INITIALIZE_ORDER_v4.0</button>
        </div>
    </div>

    <script>
        const DATA = {
            categories: [
                { id: 'minecraft', label: 'Minecraft', icon: 'fa-cube', nest: 1 },
                { id: 'source', label: 'Source', icon: 'fa-gun', nest: 2 },
                { id: 'voice', label: 'Voice', icon: 'fa-microphone', nest: 3 },
                { id: 'rust', label: 'Rust', icon: 'fa-radiation', nest: 4 },
                { id: 'bot', label: 'Bot', icon: 'fa-robot', nest: 5 }
            ],
            eggs: {
                minecraft: [{id:1, label:'Forge'}, {id:2, label:'Paper'}, {id:3, label:'Vanilla'}, {id:4, label:'Bungeecord'}, {id:5, label:'Sponge'}],
                source: [{id:6, label:'TF 2'}, {id:7, label:'Custom'}, {id:8, label:'Garrys Mod'}, {id:9, label:'CS:GO'}, {id:10, label:'Insurgency'}, {id:11, label:'Ark'}],
                voice: [{id:12, label:'TeamSpeak'}, {id:13, label:'Mumble'}],
                rust: [{id:14, label:'Rust Default'}],
                bot: [{id:15, label:'Bot WA (JS)'}, {id:16, label:'Bot WA (Py)'}]
            },
            pricing: []
        };
        for(let i=1; i<=10; i++) { DATA.pricing.push({ label: i + 'GB RAM', ram: i, do: i * 1000, legal: i * 1500 }); }
        DATA.pricing.push({ label: 'Unlimited', ram: 0, do: 15000, legal: 15000 });

        let currentOrder = { infra: 'legal', category: '', egg: null, package: null };

        window.onload = () => { renderCategories(); };

        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = DATA.categories.map(cat => `
                <label class="relative block">
                    <input type="radio" name="cat" value="${cat.id}" class="radio-hidden" onchange="selectCategory('${cat.id}')">
                    <div class="selection-item p-6 border-2 border-white/5 rounded-3xl bg-white/5 text-center">
                        <i class="fa-solid ${cat.icon} text-2xl mb-4 text-brand"></i>
                        <div class="text-[8px] font-pixel">${cat.label}</div>
                    </div>
                </label>`).join('');
        }

        function selectCategory(id) {
            currentOrder.category = id; 
            const container = document.getElementById('eggContainer');
            container.innerHTML = DATA.eggs[id].map(egg => `
                <label class="relative block">
                    <input type="radio" name="egg" value="${egg.id}" class="radio-hidden" onchange="selectEgg(${egg.id}, '${egg.label}')">
                    <div class="selection-item p-6 border-2 border-white/5 rounded-3xl bg-white/5 text-center">
                        <div class="text-[8px] font-pixel">${egg.label}</div>
                    </div>
                </label>`).join('');
            document.getElementById('eggSection').classList.remove('hidden');
            updateDots(2);
        }

        function selectEgg(id, label) {
            currentOrder.egg = { id, label };
            const container = document.getElementById('packageContainer');
            const infra = document.querySelector('input[name="infra_type"]:checked').value;
            container.innerHTML = DATA.pricing.map((pkg, i) => `
                <label class="relative block">
                    <input type="radio" name="pkg" value="${i}" class="radio-hidden" onchange="selectPackage(${i})">
                    <div class="selection-item p-6 border-2 border-white/5 rounded-3xl bg-white/5 text-center">
                        <div class="font-black text-xs mb-2">${pkg.label}</div>
                        <div class="text-[8px] font-pixel text-white/30">Rp ${pkg[infra].toLocaleString()}</div>
                    </div>
                </label>`).join('');
            document.getElementById('packageSection').classList.remove('hidden');
            updateDots(3);
        }

        function selectPackage(i) {
            const infra = document.querySelector('input[name="infra_type"]:checked').value;
            currentOrder.package = DATA.pricing[i];
            currentOrder.price = currentOrder.package[infra];
            document.getElementById('contactSection').classList.remove('hidden');
            updatePrice(); updateDots(4);
        }

        function updatePrice() {
            const infra = document.querySelector('input[name="infra_type"]:checked').value;
            let p = currentOrder.package ? currentOrder.package[infra] : 0;
            document.getElementById('totalPriceDisplay').innerText = "Rp " + p.toLocaleString('id-ID');
        }

        function updateDots(step) {
            document.querySelectorAll('.step-dot').forEach((d, i) => d.classList.toggle('active', i < step));
        }

        function refreshAll() { 
            if(currentOrder.category) selectCategory(currentOrder.category); 
            updatePrice(); 
        }

        async function processCheckout() {
            const email = document.getElementById('userEmail').value;
            const wa = document.getElementById('userWa').value;
            const infra = document.querySelector('input[name="infra_type"]:checked').value;
            if(!currentOrder.package || !email || !wa) return alert("INCOMPLETE_DATA");
            
            const btn = document.getElementById('btnBayar');
            btn.disabled = true; btn.innerHTML = "INJECTING...";
            try {
                const nestId = DATA.categories.find(c => c.id === currentOrder.category).nest;
                const response = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        nominal: currentOrder.price, email, whatsapp: wa, 
                        package_name: `${currentOrder.category.toUpperCase()} - ${currentOrder.egg.label} (${currentOrder.package.label})`,
                        nest_id: nestId, egg_id: currentOrder.egg.id, infra_type: infra
                    })
                });
                const result = await response.json();
                if(result.status === 'success') window.location.href = result.checkout_url;
            } catch (e) { alert("CORE_ERROR"); }
            finally { btn.disabled = false; btn.innerHTML = "INITIALIZE_ORDER"; }
        }

        document.addEventListener('mousemove', e => {
            const h = document.getElementById('mouse-hud');
            h.style.left = e.clientX + 'px'; h.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
