<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOUD INJECTOR | FREEZEEHOST</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=JetBrains+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'], pixel: ['"Press Start 2P"', 'cursive'] },
                    colors: { brand: '#00f2fe', blue: '#3b82f6', neon: '#bcfe00' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #fff; overflow-x: hidden; cursor: crosshair; }
        .chaos-card { background: rgba(10, 10, 10, 0.9); border: 4px solid rgba(255,255,255,0.1); border-radius: 3rem; padding: 4rem; backdrop-filter: blur(40px); position: relative; overflow: hidden; }
        .vps-card { border: 2px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); transition: 0.4s; border-radius: 2rem; cursor: pointer; }
        .vps-card:hover { border-color: #00f2fe; transform: translateY(-10px); box-shadow: 0 0 50px rgba(0, 242, 254, 0.2); }
        .vps-card.locked { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        .btn-vps { background: #fff; color: #000; font-weight: 900; padding: 1.2rem 3rem; border-radius: 999px; font-size: 10px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-vps:hover { background: #00f2fe; box-shadow: 0 0 50px #00f2fe; }
        #mouse-hud { position: fixed; width: 80px; height: 80px; border: 1px solid rgba(0, 242, 254, 0.5); border-radius: 50%; z-index: 10000; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body class="antialiased p-6">
    <div id="mouse-hud"></div>

    <nav class="fixed w-full z-[1500] py-8 px-6 top-0 left-0">
        <div class="max-w-6xl mx-auto flex items-center justify-between h-16 bg-black/60 backdrop-blur-2xl border border-white/10 rounded-full px-8">
            <a href="index.html" class="font-display text-xl font-bold flex items-center gap-3">
                <i class="fa-solid fa-cloud text-blue animate-pulse"></i>
                <span>FreeZee<span class="text-brand">Hosting</span></span>
            </a>
            <div class="font-pixel text-[8px] text-brand">CLOUD_INJECTION_v4.0</div>
        </div>
    </nav>

    <main class="min-h-screen pt-32 pb-48 px-6 text-center">
        <div class="max-w-6xl mx-auto">
            <h1 class="text-6xl md:text-9xl font-black mb-24 tracking-tighter uppercase italic shadow-brand">Cloud <span class="text-blue-500">Systems.</span></h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
                <!-- DO -->
                <div class="chaos-card border-blue-500 shadow-[0_0_100px_rgba(59,130,246,0.1)]" id="card-do">
                    <i class="fa-brands fa-digital-ocean text-8xl text-blue-500 mb-10"></i>
                    <h3 class="text-3xl font-black mb-6 italic">DIGITAL_OCEAN</h3>
                    <p class="text-white/40 font-mono text-[11px] mb-12 leading-relaxed">>> CREDIT: $200.00<br>>> LIMIT: 10 DROPLETS<br>>> STATUS: FRESH_ACTIVE</p>
                    <button onclick="location.href='https://wa.me/6285102360656?text=Beli_DO'" class="btn-vps !bg-blue-600 !text-white w-full">INIT_CONNECTION</button>
                </div>
                <!-- LINODE -->
                <div class="chaos-card border-emerald-500 shadow-[0_0_100px_rgba(16,185,129,0.1)]" id="card-linode">
                    <i class="fa-solid fa-server text-8xl text-emerald-400 mb-10"></i>
                    <h3 class="text-3xl font-black mb-6 italic">AKAMAI_LINODE</h3>
                    <p class="text-white/40 font-mono text-[11px] mb-12 leading-relaxed">>> CREDIT: $100.00<br>>> REGION: ASIA_PACIFIC<br>>> LATENCY: LOWEST</p>
                    <button onclick="location.href='https://wa.me/6285102360656?text=Beli_Linode'" class="btn-vps !bg-emerald-600 !text-white w-full">INIT_CONNECTION</button>
                </div>
                <!-- NAT -->
                <div class="chaos-card border-brand shadow-[0_0_100px_rgba(0,242,254,0.1)]">
                    <i class="fa-solid fa-network-wired text-8xl text-brand mb-10"></i>
                    <h3 class="text-3xl font-black mb-6 italic">NAT_VPS</h3>
                    <p class="text-white/40 font-mono text-[11px] mb-12 leading-relaxed">>> TYPE: SHARED_IP<br>>> USAGE: MINING/TUNNEL<br>>> PRICE: ULTRA_CHEAP</p>
                    <button onclick="location.href='https://wa.me/6285102360656?text=Beli_NAT'" class="btn-vps w-full">INIT_CONNECTION</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('mousemove', e => {
            const h = document.getElementById('mouse-hud');
            h.style.left = e.clientX + 'px'; h.style.top = e.clientY + 'px';
        });
        async function check() {
            const res = await fetch('/api/check-services');
            const data = await res.json();
            if(data.services.do === 'offline') document.getElementById('card-do').classList.add('locked');
            if(data.services.linode === 'offline') document.getElementById('card-linode').classList.add('locked');
        }
        window.onload = check;
    </script>
</body>
</html>
