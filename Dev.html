<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center | FreeZeeHosting</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'], display: ['"Space Grotesk"', 'sans-serif'] }, colors: { brand: '#00f2fe' } } } }
    </script>
    <style>
        body { background-color: #000; color: #fff; overflow-x: hidden; }
        .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2.5rem; }
        .custom-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); color: white; border-radius: 1.25rem; padding: 1.25rem; transition: all 0.3s; width: 100%; }
        .custom-input:focus { border-color: #00f2fe; outline: none; }
        .readonly-stat { background: rgba(0, 242, 254, 0.05); border-color: rgba(0, 242, 254, 0.2); color: #00f2fe; cursor: not-allowed; }
        .tab-btn { opacity: 0.3; transition: all 0.3s; cursor: pointer; padding: 0.75rem 1.5rem; border-radius: 1rem; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        .tab-btn.active { opacity: 1; background: rgba(0, 242, 254, 0.1); color: #00f2fe; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .btn-deploy { background: #fff; color: #000; font-weight: 900; padding: 1.25rem 2.5rem; border-radius: 1.5rem; transition: all 0.3s; }
        .btn-deploy:hover { box-shadow: 0 0 30px rgba(0, 242, 254, 0.4); transform: translateY(-2px); }
    </style>
</head>
<body class="antialiased p-6">
    <div class="grid-bg"></div>

    <!-- LOGIN -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center">
        <div class="max-w-md w-full p-12 glass-card text-center">
            <i class="fa-solid fa-snowflake text-brand text-4xl mb-8"></i>
            <h1 class="text-3xl font-extrabold mb-8 tracking-tighter text-center">Command Center</h1>
            <input type="text" id="devUser" class="custom-input mb-4" placeholder="Username">
            <input type="password" id="devPassword" class="custom-input mb-8" placeholder="Password">
            <button onclick="loginDev()" class="btn-deploy w-full">AUTHORIZE</button>
        </div>
    </div>

    <!-- MAIN -->
    <div id="adminContentWrapper" class="hidden max-w-5xl mx-auto pt-20">
        <header class="text-center mb-16">
            <h1 class="text-6xl font-black tracking-tighter mb-12 text-center">Core <span class="text-brand">Console.</span></h1>
            <div class="flex flex-wrap justify-center gap-4 bg-white/5 p-2 rounded-3xl w-fit mx-auto border border-white/5">
                <button onclick="switchTab('stats')" id="tab-stats" class="tab-btn active">Analytics</button>
                <button onclick="switchTab('ptero')" id="tab-ptero" class="tab-btn">Nodes</button>
                <button onclick="switchTab('gateway')" id="tab-gateway" class="tab-btn">Gateway</button>
                <button onclick="switchTab('vps')" id="tab-vps" class="tab-btn">VPS Cloud</button>
                <button onclick="switchTab('smtp')" id="tab-smtp" class="tab-btn">Mail</button>
                <button onclick="logoutDev()" class="tab-btn text-red-500">Exit</button>
            </div>
        </header>

        <div class="glass-card p-12 mb-12">
            <!-- TABS CONTENT -->
            <div id="content-stats" class="tab-content active space-y-12">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                    <div>
                        <label class="text-[10px] font-black text-brand uppercase block mb-4">Total Buyers (Auto)</label>
                        <input type="number" id="stats_buyers" class="custom-input text-4xl font-black readonly-stat" readonly>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-brand uppercase block mb-4">Total Revenue (Auto)</label>
                        <input type="number" id="stats_earnings" class="custom-input text-4xl font-black readonly-stat" readonly>
                    </div>
                </div>
                <div class="text-center">
                    <label class="text-[10px] font-black text-brand uppercase block mb-4">Total Visitors (Auto)</label>
                    <input type="number" id="stats_visitors" class="custom-input text-4xl font-black max-w-xs mx-auto text-center readonly-stat" readonly>
                </div>
                <p class="text-center text-[10px] text-white/20 uppercase font-bold tracking-widest italic">Semua statistik di atas dideteksi otomatis oleh sistem secara real-time.</p>
            </div>

            <div id="content-ptero" class="tab-content space-y-8">
                <div><label class="text-[10px] font-black text-white/30 uppercase block mb-2">Panel URL</label><input type="text" id="ptero_url" class="custom-input"></div>
                <div class="grid grid-cols-2 gap-8">
                    <div><label class="text-[10px] font-black text-white/30 uppercase block mb-2">PTLA Token</label><input type="password" id="ptero_token" class="custom-input"></div>
                    <div><label class="text-[10px] font-black text-white/30 uppercase block mb-2">PTLC Token</label><input type="password" id="ptero_client_token" class="custom-input"></div>
                </div>
                <div class="grid grid-cols-3 gap-8">
                    <div><label class="text-[9px] uppercase font-bold block text-center mb-2">Loc ID</label><input type="number" id="ptero_location" class="custom-input text-center"></div>
                    <div><label class="text-[9px] uppercase font-bold block text-center mb-2">Nest ID</label><input type="number" id="ptero_nest" class="custom-input text-center"></div>
                    <div><label class="text-[9px] uppercase font-bold block text-center mb-2">Egg ID</label><input type="number" id="ptero_egg" class="custom-input text-center"></div>
                </div>
            </div>

            <div id="content-vps" class="tab-content space-y-8 text-left">
                <div><label class="text-[10px] font-black text-white/30 uppercase block mb-2">Digital Ocean Token</label><input type="password" id="do_token" class="custom-input" placeholder="dop_v1_..."></div>
                <div><label class="text-[10px] font-black text-white/30 uppercase block mb-2">Linode Token</label><input type="password" id="linode_token" class="custom-input"></div>
            </div>

            <div id="content-gateway" class="tab-content space-y-8">
                <div class="flex gap-4 mb-8">
                    <label class="flex-1 cursor-pointer"><input type="radio" name="active_gateway" value="pakasir" class="hidden peer"><div class="p-6 rounded-2xl border border-white/5 peer-checked:border-brand peer-checked:bg-brand/10 text-center font-bold">Pakasir Auto</div></label>
                    <label class="flex-1 cursor-pointer"><input type="radio" name="active_gateway" value="manual" class="hidden peer"><div class="p-6 rounded-2xl border border-white/5 peer-checked:border-brand peer-checked:bg-brand/10 text-center font-bold">Manual WA</div></label>
                </div>
                <div class="grid grid-cols-2 gap-8">
                    <input type="text" id="pakasir_slug" class="custom-input" placeholder="Pakasir Slug">
                    <input type="password" id="pakasir_key" class="custom-input" placeholder="Pakasir Key">
                </div>
                <input type="text" id="wa_admin" class="custom-input" placeholder="WA Number (6285xxx)">
            </div>

            <div id="content-smtp" class="tab-content space-y-8 text-left">
                <div class="grid grid-cols-2 gap-8">
                    <input type="email" id="smtp_user" class="custom-input" placeholder="Gmail Address">
                    <input type="password" id="smtp_pass" class="custom-input" placeholder="App Password">
                </div>
                <input type="text" id="smtp_from" class="custom-input" placeholder="Sender Name">
            </div>
        </div>

        <button onclick="savePteroSettings()" class="btn-deploy w-full shadow-2xl">Push Updates to Core</button>
    </div>

    <script>
        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('content-' + t).classList.add('active');
            document.getElementById('tab-' + t).classList.add('active');
        }

        async function loginDev() {
            const user = document.getElementById('devUser').value;
            const pass = document.getElementById('devPassword').value;
            const res = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user, pass }) });
            const data = await res.json();
            if (data.status === 'success') { localStorage.setItem('admin_token', data.token); showAdminPanel(); }
            else alert("Access Denied");
        }

        async function showAdminPanel() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminContentWrapper').classList.remove('hidden');
            const res = await fetch('/api/admin/config', { headers: { 'Authorization': localStorage.getItem('admin_token') } });
            const data = await res.json();
            if (data.config) {
                // Display Stats (Read Only)
                document.getElementById('stats_buyers').value = data.stats.totalBuyers;
                document.getElementById('stats_earnings').value = data.stats.totalEarnings;
                document.getElementById('stats_visitors').value = data.stats.totalVisitors;
                
                // Config Values
                document.getElementById('ptero_url').value = data.config.url || '';
                document.getElementById('ptero_token').value = data.config.key || '';
                document.getElementById('ptero_client_token').value = data.config.client_key || '';
                document.getElementById('ptero_location').value = data.config.location || 1;
                document.getElementById('ptero_nest').value = data.config.nest || 1;
                document.getElementById('ptero_egg').value = data.config.egg || 15;
                document.getElementById('do_token').value = data.config.do_token || '';
                document.getElementById('linode_token').value = data.config.linode_token || '';
                document.getElementById('smtp_user').value = data.config.smtp_user || '';
                document.getElementById('smtp_pass').value = data.config.smtp_pass || '';
                document.getElementById('smtp_from').value = data.config.smtp_from || '';
                document.getElementById('pakasir_slug').value = data.config.pakasir_slug || '';
                document.getElementById('pakasir_key').value = data.config.pakasir_key || '';
                document.getElementById('wa_admin').value = data.config.wa_admin || '';
                document.querySelector(`input[name="active_gateway"][value="${data.config.active_gateway || 'manual'}"]`).checked = true;
            }
        }

        async function savePteroSettings() {
            const payload = {
                url: document.getElementById('ptero_url').value,
                key: document.getElementById('ptero_token').value,
                client_key: document.getElementById('ptero_client_token').value,
                location: document.getElementById('ptero_location').value,
                nest: document.getElementById('ptero_nest').value,
                egg: document.getElementById('ptero_egg').value,
                do_token: document.getElementById('do_token').value,
                linode_token: document.getElementById('linode_token').value,
                active_gateway: document.querySelector('input[name="active_gateway"]:checked').value,
                pakasir_slug: document.getElementById('pakasir_slug').value,
                pakasir_key: document.getElementById('pakasir_key').value,
                wa_admin: document.getElementById('wa_admin').value,
                smtp_user: document.getElementById('smtp_user').value,
                smtp_pass: document.getElementById('smtp_pass').value,
                smtp_from: document.getElementById('smtp_from').value
            };
            const res = await fetch('/api/admin/settings', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': localStorage.getItem('admin_token') }, body: JSON.stringify(payload) });
            if (res.ok) alert("Synchronized with Database!");
        }

        function logoutDev() { localStorage.removeItem('admin_token'); location.reload(); }
        if (localStorage.getItem('admin_token')) showAdminPanel();
    </script>
</body>
</html>
