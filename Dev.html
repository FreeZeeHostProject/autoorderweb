<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center | FreeZeeHosting</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                    },
                    colors: { brand: '#00f2fe', dark: '#000000' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; color: #ffffff; overflow-x: hidden; position: relative; }
        .grid-bg-static { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.01) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.01) 1px, transparent 1px); background-size: 60px 60px; z-index: -2; }
        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px); background-size: 60px 60px; mask-image: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), black 0%, transparent 50%); -webkit-mask-image: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), black 0%, transparent 50%); z-index: -1; }
        .glow-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.05) 0%, transparent 50%); z-index: -1; }

        .glass-card {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.05); border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 2.5rem; box-shadow: 0 25px 80px rgba(0,0,0,0.8);
        }

        .custom-input {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            color: white; border-radius: 1.25rem; padding: 1.25rem; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
        }
        .custom-input:focus { border-color: #00f2fe; background: rgba(0, 242, 254, 0.05); outline: none; box-shadow: 0 0 25px rgba(0, 242, 254, 0.15); }

        .btn-brand {
            background: #fff; color: #000; font-weight: 800; transition: all 0.4s ease;
            box-shadow: 0 4px 20px rgba(255,255,255,0.1);
        }
        .btn-brand:hover { box-shadow: 0 0 40px rgba(0, 242, 254, 0.5); transform: translateY(-3px); }

        .tab-btn {
            opacity: 0.3; transition: all 0.4s; cursor: pointer; padding: 0.85rem 1.75rem; border-radius: 1.25rem;
            font-weight: 700; letter-spacing: 0.05em; font-size: 0.7rem; text-transform: uppercase;
        }
        .tab-btn.active { opacity: 1; background: rgba(255, 255, 255, 0.05); color: #00f2fe; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeSlide 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .stat-badge { background: rgba(0, 242, 254, 0.1); border: 1px solid rgba(0, 242, 254, 0.2); padding: 4px 12px; border-radius: 99px; color: #00f2fe; font-size: 9px; font-weight: 900; letter-spacing: 1px; }

        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url("https://grainy-gradients.vercel.app/noise.svg"); opacity: 0.03; pointer-events: none; z-index: 99; }
    </style>
</head>
<body class="antialiased">

    <div class="grid-bg-static"></div>
    <div class="grid-bg"></div>
    <div class="glow-overlay"></div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center px-6 relative z-50">
        <div class="w-full max-w-md p-12 glass-card text-center" data-aos="zoom-in">
            <div class="w-20 h-20 bg-white/5 rounded-3xl flex items-center justify-center mx-auto mb-10 border border-white/10 shadow-inner">
                <i class="fa-solid fa-snowflake text-brand text-3xl animate-spin-slow"></i>
            </div>
            <h1 class="font-display text-3xl font-extrabold mb-3 text-white tracking-tight">Access Control</h1>
            <p class="text-white/30 text-sm mb-12 font-medium">Verify your administrative identity.</p>
            
            <div class="space-y-6 text-left">
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-white/20 uppercase tracking-[0.2em] ml-4">Identifier</label>
                    <input type="text" id="devUser" class="custom-input w-full" placeholder="Admin ID">
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-white/20 uppercase tracking-[0.2em] ml-4">Access Key</label>
                    <input type="password" id="devPassword" class="custom-input w-full" placeholder="••••••••">
                </div>
                <button onclick="loginDev()" id="btnLogin" class="w-full btn-brand py-5 rounded-2xl text-[10px] uppercase tracking-[0.2em] mt-6">Authorize Session</button>
            </div>
        </div>
    </div>

    <!-- ADMIN CONTENT -->
    <div id="adminContentWrapper" class="hidden opacity-0 transition-all duration-700 pt-32 pb-48 px-6">
        <div class="max-w-5xl mx-auto">
            
            <header class="text-center mb-20">
                <div class="stat-badge inline-block mb-8">ADMINISTRATOR_ACTIVE</div>
                <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-12 text-white">Command <span class="text-brand">Center.</span></h1>
                
                <!-- TAB NAVIGATION -->
                <div class="flex flex-wrap items-center justify-center gap-3 md:gap-4 mb-16 px-4 py-2 bg-white/5 rounded-[1.5rem] w-fit mx-auto border border-white/5">
                    <button onclick="switchTab('stats')" id="tab-stats" class="tab-btn active">Stats</button>
                    <button onclick="switchTab('ptero')" id="tab-ptero" class="tab-btn">Pterodactyl</button>
                    <button onclick="switchTab('vps')" id="tab-vps" class="tab-btn">VPS</button>
                    <button onclick="switchTab('smtp')" id="tab-smtp" class="tab-btn">Email</button>
                    <button onclick="switchTab('blacklist')" id="tab-blacklist" class="tab-btn text-red-400/60">Blacklist</button>
                    <div class="w-px h-6 bg-white/10 mx-2"></div>
                    <button onclick="logoutDev()" class="text-[10px] font-bold text-white/20 hover:text-red-500 transition-all uppercase px-2">Exit</button>
                </div>
            </header>

            <div class="glass-card p-10 md:p-16 mb-16 relative overflow-hidden">
                <!-- Inner Light Effect -->
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-brand/30 to-transparent"></div>

                <!-- TABS CONTENT -->
                <div id="content-stats" class="tab-content active space-y-12">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                        <div class="space-y-4">
                            <label class="text-[10px] font-black text-brand uppercase tracking-widest ml-4">Total Real Buyers</label>
                            <input type="number" id="stats_buyers" class="custom-input w-full font-extrabold text-4xl">
                        </div>
                        <div class="space-y-4">
                            <label class="text-[10px] font-black text-brand uppercase tracking-widest ml-4">Net Revenue (IDR)</label>
                            <input type="number" id="stats_earnings" class="custom-input w-full font-extrabold text-4xl">
                        </div>
                    </div>
                    <p class="text-center text-[10px] text-white/20 font-medium">Data di atas akan disinkronkan ke Landing Page secara real-time.</p>
                </div>

                <div id="content-ptero" class="tab-content space-y-12 text-left">
                    <div class="grid grid-cols-1 gap-10">
                        <div class="space-y-3"><label class="text-[10px] font-black text-white/30 uppercase ml-4">Panel API Endpoint</label><input type="text" id="ptero_url" class="custom-input w-full font-bold" placeholder="https://..."></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                            <div class="space-y-3"><label class="text-[10px] font-black text-white/30 uppercase ml-4">Application Token (PTLA)</label><input type="password" id="ptero_token" class="custom-input w-full"></div>
                            <div class="space-y-3"><label class="text-[10px] font-black text-white/30 uppercase ml-4">Client Token (PTLC)</label><input type="password" id="ptero_client_token" class="custom-input w-full"></div>
                        </div>
                        <div class="grid grid-cols-3 gap-6 bg-white/5 p-8 rounded-[2rem]">
                            <div class="text-center"><label class="text-[9px] text-white/30 uppercase font-black block mb-3">LOC_ID</label><input type="number" id="ptero_location" class="custom-input w-full text-center text-xl font-black"></div>
                            <div class="text-center"><label class="text-[9px] text-white/30 uppercase font-black block mb-3">NEST_ID</label><input type="number" id="ptero_nest" class="custom-input w-full text-center text-xl font-black"></div>
                            <div class="text-center"><label class="text-[9px] text-white/30 uppercase font-black block mb-3">EGG_ID</label><input type="number" id="ptero_egg" class="custom-input w-full text-center text-xl font-black"></div>
                        </div>
                    </div>
                </div>

                <div id="content-vps" class="tab-content space-y-12 text-left">
                    <div class="grid grid-cols-1 gap-10">
                        <div class="space-y-3"><label class="text-[10px] font-black text-white/30 uppercase ml-4">Digital Ocean Secret Key</label><input type="password" id="do_token" class="custom-input w-full" placeholder="dop_v1_..."></div>
                        <div class="space-y-3"><label class="text-[10px] font-black text-white/30 uppercase ml-4">Linode Personal Token</label><input type="password" id="linode_token" class="custom-input w-full"></div>
                    </div>
                </div>

                <div id="content-smtp" class="tab-content space-y-12 text-left">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div class="space-y-3"><label class="text-[10px] font-black text-white/30 uppercase ml-4">Gmail SMTP Address</label><input type="email" id="smtp_user" class="custom-input w-full"></div>
                        <div class="space-y-3"><label class="text-[10px] font-black text-white/30 uppercase ml-4">App Secure Password</label><input type="password" id="smtp_pass" class="custom-input w-full"></div>
                        <div class="md:col-span-2 space-y-3"><label class="text-[10px] font-black text-white/30 uppercase ml-4">Mail Sender Signature</label><input type="text" id="smtp_from" class="custom-input w-full" placeholder="FreeZeeHost Botz"></div>
                    </div>
                </div>

                <div id="content-blacklist" class="tab-content space-y-10">
                    <div class="flex items-center justify-between border-b border-white/5 pb-6">
                        <h3 class="text-2xl font-extrabold tracking-tighter text-red-400">Security Firewall</h3>
                        <div class="text-[10px] font-black text-white/20 uppercase tracking-widest">Active Monitoring</div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="blacklist-list"></div>
                </div>
            </div>

            <!-- COMMIT BUTTON -->
            <div class="text-center">
                <button onclick="savePteroSettings(event)" id="btnSave" class="btn-brand px-24 py-6 rounded-[2rem] text-[11px] font-black uppercase tracking-[0.3em] shadow-2xl">Deploy Changes</button>
            </div>

        </div>
    </div>

    <!-- NOTIFICATION MODAL -->
    <div id="customAlertModal" class="fixed inset-0 z-[100] flex items-center justify-center px-6 opacity-0 pointer-events-none transition-all duration-500">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-md"></div>
        <div class="relative text-center max-w-sm glass-card p-12 border-brand/20">
            <div class="w-16 h-16 bg-brand/10 rounded-2xl flex items-center justify-center mx-auto mb-8 border border-brand/20">
                <i class="fa-solid fa-circle-check text-brand text-2xl"></i>
            </div>
            <h3 id="alertTitle" class="text-3xl font-extrabold mb-4 tracking-tighter text-white"></h3>
            <p id="alertMsg" class="text-white/40 text-sm mb-10 leading-relaxed"></p>
            <button onclick="closeAlert()" class="w-full py-4 bg-white text-black font-black rounded-2xl text-[10px] uppercase tracking-widest shadow-xl">Complete Task</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, duration: 1000 });
        let GLOBAL_BLACKLIST = [];

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('content-' + t).classList.add('active');
            document.getElementById('tab-' + t).classList.add('active');
            if(t === 'blacklist') renderBlacklist();
        }

        async function loginDev() {
            const user = document.getElementById('devUser').value;
            const pass = document.getElementById('devPassword').value;
            const btn = document.getElementById('btnLogin');
            btn.disabled = true; btn.innerHTML = "VERIFYING_AUTH...";
            try {
                const res = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user, pass }) });
                const data = await res.json();
                if (data.status === 'success') { localStorage.setItem('admin_token', data.token); showAdminPanel(); }
                else { showAlert("ACCESS_DENIED", "The security token provided is invalid."); }
            } catch (e) { showAlert("SYSTEM_ERROR", "Could not establish connection to the core."); }
            finally { btn.disabled = false; btn.innerHTML = "Authorize Session"; }
        }

        async function showAdminPanel() {
            const token = localStorage.getItem('admin_token');
            if(!token) return;
            document.getElementById('loginScreen').classList.add('hidden');
            const wrap = document.getElementById('adminContentWrapper');
            wrap.classList.remove('hidden');
            setTimeout(() => wrap.classList.add('opacity-100'), 100);
            try {
                const res = await fetch('/api/admin/config', { headers: { 'Authorization': token } });
                const data = await res.json();
                if (data.config) {
                    document.getElementById('ptero_url').value = data.config.url || '';
                    document.getElementById('ptero_token').value = data.config.key || '';
                    document.getElementById('ptero_client_token').value = data.config.client_key || '';
                    document.getElementById('smtp_user').value = data.config.smtp_user || '';
                    document.getElementById('smtp_pass').value = data.config.smtp_pass || '';
                    document.getElementById('smtp_from').value = data.config.smtp_from || '';
                    document.getElementById('ptero_location').value = data.config.location || 1;
                    document.getElementById('ptero_nest').value = data.config.nest || 1;
                    document.getElementById('ptero_egg').value = data.config.egg || 15;
                    document.getElementById('do_token').value = data.config.do_token || '';
                    document.getElementById('linode_token').value = data.config.linode_token || '';
                    document.getElementById('stats_buyers').value = data.stats.totalBuyers || 0;
                    document.getElementById('stats_earnings').value = data.stats.totalEarnings || 0;
                    GLOBAL_BLACKLIST = data.config.blacklist || [];
                }
            } catch(e) {}
        }

        function renderBlacklist() {
            const container = document.getElementById('blacklist-list');
            if(GLOBAL_BLACKLIST.length === 0) { container.innerHTML = '<div class="text-white/10 text-[10px] font-bold py-10 text-center uppercase tracking-widest">Firewall Clear.</div>'; return; }
            container.innerHTML = GLOBAL_BLACKLIST.map(ip => `<div class="flex items-center justify-between p-5 bg-white/5 rounded-[1.5rem] border border-white/5 shadow-inner"><div class="font-mono text-xs text-brand/60 font-bold">${ip}</div><button onclick="removeBlacklist('${ip}')" class="text-[9px] font-black uppercase text-red-500 hover:text-red-400 transition-all tracking-wider">Revoke Access</button></div>`).join('');
        }

        async function removeBlacklist(ip) {
            const token = localStorage.getItem('admin_token');
            try {
                const res = await fetch('/api/admin/blacklist/remove', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': token }, body: JSON.stringify({ ip }) });
                if(res.ok) { GLOBAL_BLACKLIST = GLOBAL_BLACKLIST.filter(i => i !== ip); renderBlacklist(); }
            } catch(e) {}
        }

        async function savePteroSettings(e) {
            const token = localStorage.getItem('admin_token');
            const btn = document.getElementById('btnSave');
            btn.disabled = true; btn.innerHTML = "DEPLOYING...";
            const payload = {
                url: document.getElementById('ptero_url').value, key: document.getElementById('ptero_token').value, client_key: document.getElementById('ptero_client_token').value,
                smtp_user: document.getElementById('smtp_user').value, smtp_pass: document.getElementById('smtp_pass').value, smtp_from: document.getElementById('smtp_from').value,
                location: document.getElementById('ptero_location').value, nest: document.getElementById('ptero_nest').value, egg: document.getElementById('ptero_egg').value,
                do_token: document.getElementById('do_token').value, linode_token: document.getElementById('linode_token').value,
                stats_buyers: document.getElementById('stats_buyers').value, stats_earnings: document.getElementById('stats_earnings').value,
                blacklist: GLOBAL_BLACKLIST
            };
            try {
                const res = await fetch('/api/admin/settings', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': token }, body: JSON.stringify(payload) });
                if (res.ok) { showAlert("SYSTEM_DEPLOYED", "Administrative registries have been synchronized successfully."); }
                else { showAlert("DEPLOY_FAILED", "Authentication token might be expired."); }
            } catch (err) { showAlert("CORE_OFFLINE", "Critical communication failure."); }
            finally { btn.disabled = false; btn.innerHTML = "Deploy Changes"; }
        }

        function showAlert(title, msg) { document.getElementById('alertTitle').innerText = title; document.getElementById('alertMsg').innerText = msg; document.getElementById('customAlertModal').classList.remove('opacity-0', 'pointer-events-none'); }
        function closeAlert() { document.getElementById('customAlertModal').classList.add('opacity-0', 'pointer-events-none'); }
        document.addEventListener('mousemove', e => { document.documentElement.style.setProperty('--mouse-x', `${(e.clientX / window.innerWidth) * 100}%`); document.documentElement.style.setProperty('--mouse-y', `${(e.clientY / window.innerHeight) * 100}%`); });
    </script>
</body>
</html>
