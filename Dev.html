<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | FreeZeeHosting</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                    },
                    colors: { brand: '#00f2fe', dark: '#000000' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; color: #ffffff; overflow-x: hidden; position: relative; }
        .grid-bg-static { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.01) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.01) 1px, transparent 1px); background-size: 60px 60px; z-index: -2; }
        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px); background-size: 60px 60px; mask-image: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), black 0%, transparent 50%); -webkit-mask-image: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), black 0%, transparent 50%); z-index: -1; }
        .glow-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.05) 0%, transparent 50%); z-index: -1; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .custom-input {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            color: white; border-radius: 1rem; padding: 1rem; transition: all 0.3s;
        }
        .custom-input:focus { border-color: #00f2fe; background: rgba(255,255,255,0.05); outline: none; }

        .btn-brand { background: #fff; color: #000; font-weight: 900; transition: all 0.3s; }
        .btn-brand:hover { box-shadow: 0 0 30px rgba(0, 242, 254, 0.4); transform: translateY(-2px); }

        .tab-btn { opacity: 0.4; transition: all 0.3s; cursor: pointer; padding: 0.75rem 1.5rem; border-radius: 1rem; }
        .tab-btn.active { opacity: 1; background: rgba(0, 242, 254, 0.1); color: #00f2fe; border: 1px solid rgba(0, 242, 254, 0.2); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url("https://grainy-gradients.vercel.app/noise.svg"); opacity: 0.03; pointer-events: none; z-index: 99; }
    </style>
</head>
<body class="antialiased">

    <div class="grid-bg-static"></div>
    <div class="grid-bg"></div>
    <div class="glow-overlay"></div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center px-6 relative z-50">
        <div class="w-full max-w-md p-10 glass-card text-center" data-aos="zoom-in">
            <div class="w-16 h-16 bg-brand/10 rounded-2xl flex items-center justify-center mx-auto mb-8 border border-brand/20">
                <i class="fa-solid fa-snowflake text-brand text-2xl animate-spin-slow"></i>
            </div>
            <h1 class="font-display text-2xl font-bold mb-2 text-white">Admin Authorization</h1>
            <p class="text-white/40 text-sm mb-10">Protected Command Center Access</p>
            
            <div class="space-y-5 text-left">
                <input type="text" id="devUser" class="custom-input w-full" placeholder="Username">
                <input type="password" id="devPassword" class="custom-input w-full" placeholder="Password">
                <button onclick="loginDev()" id="btnLogin" class="w-full btn-brand py-4 rounded-2xl text-xs uppercase tracking-widest mt-4">Unlock Access</button>
            </div>
        </div>
    </div>

    <!-- ADMIN CONTENT -->
    <div id="adminContentWrapper" class="hidden opacity-0 transition-all duration-700 pt-32 pb-32 px-6">
        <div class="max-w-4xl mx-auto">
            
            <header class="text-center mb-16">
                <div class="inline-block px-4 py-1 rounded-full border border-brand/20 bg-brand/5 text-brand text-[8px] font-black uppercase tracking-widest mb-6">Administrator Mode</div>
                <h1 class="text-4xl md:text-6xl font-extrabold tracking-tighter mb-10 text-white">Command Center.</h1>
                
                <!-- TAB NAVIGATION -->
                <div class="flex flex-wrap items-center justify-center gap-2 md:gap-4 mb-12">
                    <button onclick="switchTab('stats')" id="tab-stats" class="tab-btn active text-[10px] font-bold uppercase tracking-widest">Stats</button>
                    <button onclick="switchTab('ptero')" id="tab-ptero" class="tab-btn text-[10px] font-bold uppercase tracking-widest">Pterodactyl</button>
                    <button onclick="switchTab('vps')" id="tab-vps" class="tab-btn text-[10px] font-bold uppercase tracking-widest">VPS</button>
                    <button onclick="switchTab('smtp')" id="tab-smtp" class="tab-btn text-[10px] font-bold uppercase tracking-widest">Email</button>
                    <button onclick="switchTab('blacklist')" id="tab-blacklist" class="tab-btn text-[10px] font-bold uppercase tracking-widest text-red-400">Blacklist</button>
                    <button onclick="logoutDev()" class="ml-4 text-[10px] font-bold uppercase text-white/30 hover:text-white">Logout</button>
                </div>
            </header>

            <div class="glass-card p-8 md:p-12 mb-12">
                <!-- TABS CONTENT -->
                <div id="content-stats" class="tab-content active space-y-10">
                    <h3 class="text-xl font-bold mb-8 flex items-center gap-3"><i class="fa-solid fa-chart-line text-brand"></i> Business Metrics</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-white/30 uppercase tracking-widest ml-1">Total Buyers</label>
                            <input type="number" id="stats_buyers" class="custom-input w-full font-bold text-2xl">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-white/30 uppercase tracking-widest ml-1">Total Earnings (IDR)</label>
                            <input type="number" id="stats_earnings" class="custom-input w-full font-bold text-2xl">
                        </div>
                    </div>
                </div>

                <div id="content-ptero" class="tab-content space-y-10 text-left">
                    <h3 class="text-xl font-bold mb-8 flex items-center gap-3"><i class="fa-solid fa-server text-brand"></i> Panel Configuration</h3>
                    <div class="space-y-6">
                        <div><label class="text-[10px] font-black text-white/30 uppercase ml-1">API URL</label><input type="text" id="ptero_url" class="custom-input w-full" placeholder="https://..."></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div><label class="text-[10px] font-black text-white/30 uppercase ml-1">PTLA Token</label><input type="password" id="ptero_token" class="custom-input w-full"></div>
                            <div><label class="text-[10px] font-black text-white/30 uppercase ml-1">PTLC Token</label><input type="password" id="ptero_client_token" class="custom-input w-full"></div>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <div><label class="text-[9px] text-white/30 uppercase font-bold text-center block">Loc ID</label><input type="number" id="ptero_location" class="custom-input w-full text-center"></div>
                            <div><label class="text-[9px] text-white/30 uppercase font-bold text-center block">Nest ID</label><input type="number" id="ptero_nest" class="custom-input w-full text-center"></div>
                            <div><label class="text-[9px] text-white/30 uppercase font-bold text-center block">Egg ID</label><input type="number" id="ptero_egg" class="custom-input w-full text-center"></div>
                        </div>
                    </div>
                </div>

                <div id="content-vps" class="tab-content space-y-10 text-left">
                    <h3 class="text-xl font-bold mb-8 flex items-center gap-3"><i class="fa-solid fa-cloud text-brand"></i> VPS Integration</h3>
                    <div class="grid grid-cols-1 gap-6">
                        <div><label class="text-[10px] font-black text-white/30 uppercase ml-1">Digital Ocean Token</label><input type="password" id="do_token" class="custom-input w-full" placeholder="dop_v1_..."></div>
                        <div><label class="text-[10px] font-black text-white/30 uppercase ml-1">Linode API Key</label><input type="password" id="linode_token" class="custom-input w-full"></div>
                    </div>
                </div>

                <div id="content-smtp" class="tab-content space-y-10 text-left">
                    <h3 class="text-xl font-bold mb-8 flex items-center gap-3"><i class="fa-solid fa-envelope text-brand"></i> SMTP Gateway</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="text-[10px] font-black text-white/30 uppercase ml-1">Email Account</label><input type="email" id="smtp_user" class="custom-input w-full"></div>
                        <div><label class="text-[10px] font-black text-white/30 uppercase ml-1">App Password</label><input type="password" id="smtp_pass" class="custom-input w-full"></div>
                        <div class="md:col-span-2"><label class="text-[10px] font-black text-white/30 uppercase ml-1">Sender Name</label><input type="text" id="smtp_from" class="custom-input w-full"></div>
                    </div>
                </div>

                <div id="content-blacklist" class="tab-content space-y-8">
                    <h3 class="text-xl font-bold mb-8 flex items-center gap-3 text-red-400"><i class="fa-solid fa-user-slash"></i> Restricted IPs</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="blacklist-list"></div>
                </div>
            </div>

            <!-- COMMIT BUTTON -->
            <div class="text-center">
                <button onclick="savePteroSettings(event)" id="btnSave" class="btn-brand px-20 py-5 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] shadow-2xl">Commit All Changes</button>
            </div>

        </div>
    </div>

    <!-- MODAL -->
    <div id="customAlertModal" class="fixed inset-0 z-[100] flex items-center justify-center px-6 opacity-0 pointer-events-none transition-all duration-500"><div class="absolute inset-0 bg-black/95 backdrop-blur-md"></div><div class="relative text-center max-w-sm glass-card p-10"><h3 id="alertTitle" class="text-2xl font-extrabold mb-4 tracking-tighter text-white"></h3><p id="alertMsg" class="text-white/40 text-xs mb-8 leading-relaxed"></p><button onclick="closeAlert()" class="w-full py-4 bg-brand text-black font-black rounded-xl text-[10px] uppercase tracking-widest shadow-lg">Dimengerti</button></div></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, duration: 1000 });
        let GLOBAL_BLACKLIST = [];

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('content-' + t).classList.add('active');
            document.getElementById('tab-' + t).classList.add('active');
            if(t === 'blacklist') renderBlacklist();
        }

        async function loginDev() {
            const user = document.getElementById('devUser').value;
            const pass = document.getElementById('devPassword').value;
            const btn = document.getElementById('btnLogin');
            btn.disabled = true; btn.innerHTML = "VERIFYING...";
            try {
                const res = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user, pass }) });
                const data = await res.json();
                if (data.status === 'success') { localStorage.setItem('admin_token', data.token); showAdminPanel(); }
                else { showAlert("Access Denied", "Invalid administrative credentials."); }
            } catch (e) { showAlert("System Error", "Failed to reach backend."); }
            finally { btn.disabled = false; btn.innerHTML = "Unlock Access"; }
        }

        async function showAdminPanel() {
            const token = localStorage.getItem('admin_token');
            if(!token) return;
            document.getElementById('loginScreen').classList.add('hidden');
            const wrap = document.getElementById('adminContentWrapper');
            wrap.classList.remove('hidden');
            setTimeout(() => wrap.classList.add('opacity-100'), 100);
            try {
                const res = await fetch('/api/admin/config', { headers: { 'Authorization': token } });
                const data = await res.json();
                if (data.config) {
                    document.getElementById('ptero_url').value = data.config.url || '';
                    document.getElementById('ptero_token').value = data.config.key || '';
                    document.getElementById('ptero_client_token').value = data.config.client_key || '';
                    document.getElementById('smtp_user').value = data.config.smtp_user || '';
                    document.getElementById('smtp_pass').value = data.config.smtp_pass || '';
                    document.getElementById('smtp_from').value = data.config.smtp_from || '';
                    document.getElementById('ptero_location').value = data.config.location || 1;
                    document.getElementById('ptero_nest').value = data.config.nest || 1;
                    document.getElementById('ptero_egg').value = data.config.egg || 15;
                    document.getElementById('do_token').value = data.config.do_token || '';
                    document.getElementById('linode_token').value = data.config.linode_token || '';
                    document.getElementById('stats_buyers').value = data.stats.totalBuyers || 0;
                    document.getElementById('stats_earnings').value = data.stats.totalEarnings || 0;
                    GLOBAL_BLACKLIST = data.config.blacklist || [];
                }
            } catch(e) {}
        }

        function renderBlacklist() {
            const container = document.getElementById('blacklist-list');
            if(GLOBAL_BLACKLIST.length === 0) { container.innerHTML = '<div class="text-white/10 text-xs py-10 text-center">Firewall clear.</div>'; return; }
            container.innerHTML = GLOBAL_BLACKLIST.map(ip => `<div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5"><div class="font-mono text-xs text-white/60">${ip}</div><button onclick="removeBlacklist('${ip}')" class="text-[9px] font-black uppercase text-red-500 hover:text-red-400">Remove</button></div>`).join('');
        }

        async function removeBlacklist(ip) {
            const token = localStorage.getItem('admin_token');
            try {
                const res = await fetch('/api/admin/blacklist/remove', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': token }, body: JSON.stringify({ ip }) });
                if(res.ok) { GLOBAL_BLACKLIST = GLOBAL_BLACKLIST.filter(i => i !== ip); renderBlacklist(); }
            } catch(e) {}
        }

        async function savePteroSettings(e) {
            const token = localStorage.getItem('admin_token');
            const btn = document.getElementById('btnSave');
            btn.disabled = true; btn.innerHTML = "COMMITTING...";
            const payload = {
                url: document.getElementById('ptero_url').value, key: document.getElementById('ptero_token').value, client_key: document.getElementById('ptero_client_token').value,
                smtp_user: document.getElementById('smtp_user').value, smtp_pass: document.getElementById('smtp_pass').value, smtp_from: document.getElementById('smtp_from').value,
                location: document.getElementById('ptero_location').value, nest: document.getElementById('ptero_nest').value, egg: document.getElementById('ptero_egg').value,
                do_token: document.getElementById('do_token').value, linode_token: document.getElementById('linode_token').value,
                stats_buyers: document.getElementById('stats_buyers').value, stats_earnings: document.getElementById('stats_earnings').value,
                blacklist: GLOBAL_BLACKLIST
            };
            try {
                const res = await fetch('/api/admin/settings', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': token }, body: JSON.stringify(payload) });
                if (res.ok) { showAlert("System Updated", "Administrative parameters synchronized."); }
                else { showAlert("Error", "Unauthorized or invalid data."); }
            } catch (err) { showAlert("Error", "Communication failure."); }
            finally { btn.disabled = false; btn.innerHTML = "Commit All Changes"; }
        }

        function showAlert(title, msg) { document.getElementById('alertTitle').innerText = title; document.getElementById('alertMsg').innerText = msg; document.getElementById('customAlertModal').classList.remove('opacity-0', 'pointer-events-none'); }
        function closeAlert() { document.getElementById('customAlertModal').classList.add('opacity-0', 'pointer-events-none'); }
        document.addEventListener('mousemove', e => { document.documentElement.style.setProperty('--mouse-x', `${(e.clientX / window.innerWidth) * 100}%`); document.documentElement.style.setProperty('--mouse-y', `${(e.clientY / window.innerHeight) * 100}%`); });
    </script>
</body>
</html>
