<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center | FreeZeeHosting</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                    },
                    colors: { brand: '#00f2fe', dark: '#000000', security: '#f59e0b' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; color: #ffffff; overflow-x: hidden; position: relative; }
        
        /* THEME BACKGROUND */
        .grid-bg-static { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.01) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.01) 1px, transparent 1px); background-size: 60px 60px; z-index: -2; }
        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px); background-size: 60px 60px; mask-image: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), black 0%, transparent 50%); -webkit-mask-image: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), black 0%, transparent 50%); z-index: -1; }
        .glow-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.05) 0%, transparent 50%); z-index: -1; }

        /* CYBER INPUTS */
        .cyber-input {
            background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 1rem 0; transition: all 0.3s ease; font-weight: 700; font-size: 1.25rem;
        }
        .cyber-input:focus { border-bottom-color: #00f2fe; outline: none; text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }
        .cyber-input::placeholder { color: rgba(255,255,255,0.1); font-weight: 400; }

        /* TABS */
        .tab-btn { opacity: 0.2; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; position: relative; }
        .tab-btn.active { opacity: 1; color: #00f2fe; }
        .tab-btn.active::after { content: ""; position: absolute; bottom: -10px; left: 0; width: 100%; height: 2px; background: #00f2fe; box-shadow: 0 0 15px #00f2fe; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideIn 0.6s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        .btn-commit {
            background: #fff; color: #000; font-weight: 900;
            box-shadow: 0 0 0px rgba(255,255,255,0); transition: all 0.4s ease;
        }
        .btn-commit:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(0, 242, 254, 0.4); }

        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url("https://grainy-gradients.vercel.app/noise.svg"); opacity: 0.03; pointer-events: none; z-index: 99; }
    </style>
</head>
<body class="antialiased">

    <div class="grid-bg-static"></div>
    <div class="grid-bg"></div>
    <div class="glow-overlay"></div>

    <!-- LOGIN -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center px-6 relative z-50">
        <div class="w-full max-w-sm text-center" data-aos="zoom-out">
            <i class="fa-solid fa-snowflake text-brand text-5xl mb-10 animate-spin-slow"></i>
            <h1 class="text-4xl font-extrabold tracking-tighter mb-12">Authorization <br>Required.</h1>
            <div class="space-y-8 text-left">
                <input type="text" id="devUser" class="cyber-input w-full" placeholder="IDENTIFIER">
                <input type="password" id="devPassword" class="cyber-input w-full" placeholder="ACCESS_KEY">
                <button onclick="loginDev()" id="btnLogin" class="w-full py-5 bg-white text-black font-black uppercase tracking-[0.2em] rounded-full mt-6">Unlock Core</button>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="adminContentWrapper" class="hidden opacity-0 transition-all duration-700 pt-20 pb-40 px-6">
        <div class="max-w-5xl mx-auto">
            
            <header class="flex flex-col items-start mb-24">
                <div class="text-brand text-[10px] font-black uppercase tracking-[0.5em] mb-4">Command Center v2.0</div>
                <h1 class="text-5xl md:text-8xl font-extrabold tracking-tighter mb-12">Core Settings.</h1>
                
                <div class="flex items-center gap-8 md:gap-12 border-b border-white/5 pb-6 w-full overflow-x-auto no-scrollbar">
                    <button onclick="switchTab('stats')" id="tab-stats" class="tab-btn active text-[10px] font-black uppercase tracking-[0.3em]">01. Stats</button>
                    <button onclick="switchTab('ptero')" id="tab-ptero" class="tab-btn text-[10px] font-black uppercase tracking-[0.3em]">02. Node</button>
                    <button onclick="switchTab('vps')" id="tab-vps" class="tab-btn text-[10px] font-black uppercase tracking-[0.3em]">03. VPS</button>
                    <button onclick="switchTab('smtp')" id="tab-smtp" class="tab-btn text-[10px] font-black uppercase tracking-[0.3em]">04. Mail</button>
                    <button onclick="switchTab('blacklist')" id="tab-blacklist" class="tab-btn text-[10px] font-black uppercase tracking-[0.3em]">05. Security</button>
                    <button onclick="logoutDev()" class="text-[10px] font-black uppercase tracking-[0.3em] text-red-500/40 hover:text-red-500 ml-auto">Terminate</button>
                </div>
            </header>

            <div class="min-h-[400px]">
                
                <!-- 01 STATS -->
                <div id="content-stats" class="tab-content active space-y-24">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-20">
                        <div class="group">
                            <label class="text-[10px] font-black text-white/20 uppercase tracking-widest block mb-4 group-focus-within:text-brand transition-colors">Active Customers</label>
                            <input type="number" id="stats_buyers" class="cyber-input w-full text-6xl">
                        </div>
                        <div class="group">
                            <label class="text-[10px] font-black text-white/20 uppercase tracking-widest block mb-4 group-focus-within:text-brand transition-colors">Gross Revenue (IDR)</label>
                            <input type="number" id="stats_earnings" class="cyber-input w-full text-6xl">
                        </div>
                    </div>
                </div>

                <!-- 02 PTERO -->
                <div id="content-ptero" class="tab-content space-y-20">
                    <div class="grid grid-cols-1 gap-16">
                        <div><label class="text-[10px] font-black text-white/20 uppercase tracking-widest block mb-4">Controller API URL</label><input type="text" id="ptero_url" class="cyber-input w-full" placeholder="https://..."></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
                            <div><label class="text-[10px] font-black text-white/20 uppercase tracking-widest block mb-4">Application Token (PTLA)</label><input type="password" id="ptero_token" class="cyber-input w-full"></div>
                            <div><label class="text-[10px] font-black text-white/20 uppercase tracking-widest block mb-4">Client Token (PTLC)</label><input type="password" id="ptero_client_token" class="cyber-input w-full"></div>
                        </div>
                        <div class="grid grid-cols-3 gap-10">
                            <div><label class="text-[10px] font-black text-white/20 uppercase tracking-widest block mb-4">Location</label><input type="number" id="ptero_location" class="cyber-input w-full"></div>
                            <div><label class="text-[10px] font-black text-white/20 uppercase tracking-widest block mb-4">Nest</label><input type="number" id="ptero_nest" class="cyber-input w-full"></div>
                            <div><label class="text-[10px] font-black text-white/20 uppercase tracking-widest block mb-4">Egg</label><input type="number" id="ptero_egg" class="cyber-input w-full"></div>
                        </div>
                    </div>
                </div>

                <!-- 03 VPS -->
                <div id="content-vps" class="tab-content space-y-20">
                    <div class="grid grid-cols-1 gap-16">
                        <div><label class="text-[10px] font-black text-white/20 uppercase tracking-widest block mb-4">Digital Ocean Key</label><input type="password" id="do_token" class="cyber-input w-full"></div>
                        <div><label class="text-[10px] font-black text-white/20 uppercase tracking-widest block mb-4">Linode / Akamai Key</label><input type="password" id="linode_token" class="cyber-input w-full"></div>
                    </div>
                </div>

                <!-- 04 SMTP -->
                <div id="content-smtp" class="tab-content space-y-20">
                    <div class="grid grid-cols-1 gap-16">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
                            <div><label class="text-[10px] font-black text-white/20 uppercase tracking-widest block mb-4">Gateway Email</label><input type="email" id="smtp_user" class="cyber-input w-full"></div>
                            <div><label class="text-[10px] font-black text-white/20 uppercase tracking-widest block mb-4">App Password</label><input type="password" id="smtp_pass" class="cyber-input w-full"></div>
                        </div>
                        <div><label class="text-[10px] font-black text-white/20 uppercase tracking-widest block mb-4">Sender Signature</label><input type="text" id="smtp_from" class="cyber-input w-full"></div>
                    </div>
                </div>

                <!-- 05 BLACKLIST -->
                <div id="content-blacklist" class="tab-content space-y-12">
                    <div class="flex items-center justify-between">
                        <h3 class="text-xl font-bold tracking-tight">Access Restrictions</h3>
                        <div class="text-[10px] text-security font-black uppercase tracking-widest">Active Firewall</div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="blacklist-list"></div>
                </div>

            </div>

            <!-- FOOTER ACTION -->
            <div class="mt-32 pt-12 border-t border-white/5 flex flex-col md:flex-row items-center justify-between gap-8">
                <p class="text-white/20 text-[10px] font-medium tracking-wider">Warning: All changes are pushed to Cloud Registry instantly.</p>
                <button onclick="savePteroSettings(event)" id="btnSave" class="btn-commit px-20 py-5 rounded-full text-[10px] font-black uppercase tracking-[0.3em]">Commit Changes</button>
            </div>

        </div>
    </div>

    <!-- ALERT -->
    <div id="customAlertModal" class="fixed inset-0 z-[100] flex items-center justify-center px-6 opacity-0 pointer-events-none transition-all duration-500"><div class="absolute inset-0 bg-black/95 backdrop-blur-md"></div><div class="relative text-left max-w-sm"><h3 id="alertTitle" class="text-3xl font-extrabold mb-4 tracking-tighter text-white"></h3><p id="alertMsg" class="text-white/40 text-sm mb-10 leading-relaxed"></p><button onclick="closeAlert()" class="w-full py-4 border border-white/10 rounded-full text-[10px] font-black uppercase tracking-widest text-white hover:bg-white/5">Acknowledge</button></div></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, duration: 1000 });
        let GLOBAL_BLACKLIST = [];

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('content-' + t).classList.add('active');
            document.getElementById('tab-' + t).classList.add('active');
            if(t === 'blacklist') renderBlacklist();
        }

        async function loginDev() {
            const user = document.getElementById('devUser').value;
            const pass = document.getElementById('devPassword').value;
            const btn = document.getElementById('btnLogin');
            btn.disabled = true; btn.innerHTML = "AUTHENTICATING...";
            try {
                const res = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user, pass }) });
                const data = await res.json();
                if (data.status === 'success') { localStorage.setItem('admin_token', data.token); showAdminPanel(); }
                else { showAlert("ACCESS_DENIED", "Invalid credentials provided."); }
            } catch (e) { showAlert("ERROR", "System offline."); }
            finally { btn.disabled = false; btn.innerHTML = "Unlock Core"; }
        }

        async function showAdminPanel() {
            const token = localStorage.getItem('admin_token');
            if(!token) return;
            document.getElementById('loginScreen').classList.add('hidden');
            const wrap = document.getElementById('adminContentWrapper');
            wrap.classList.remove('hidden');
            setTimeout(() => wrap.classList.add('opacity-100'), 100);
            try {
                const res = await fetch('/api/admin/config', { headers: { 'Authorization': token } });
                const data = await res.json();
                if (data.config) {
                    document.getElementById('ptero_url').value = data.config.url || '';
                    document.getElementById('ptero_token').value = data.config.key || '';
                    document.getElementById('ptero_client_token').value = data.config.client_key || '';
                    document.getElementById('smtp_user').value = data.config.smtp_user || '';
                    document.getElementById('smtp_pass').value = data.config.smtp_pass || '';
                    document.getElementById('smtp_from').value = data.config.smtp_from || '';
                    document.getElementById('ptero_location').value = data.config.location || 1;
                    document.getElementById('ptero_nest').value = data.config.nest || 1;
                    document.getElementById('ptero_egg').value = data.config.egg || 15;
                    document.getElementById('do_token').value = data.config.do_token || '';
                    document.getElementById('linode_token').value = data.config.linode_token || '';
                    document.getElementById('stats_buyers').value = data.stats.totalBuyers || 0;
                    document.getElementById('stats_earnings').value = data.stats.totalEarnings || 0;
                    GLOBAL_BLACKLIST = data.config.blacklist || [];
                }
            } catch(e) {}
        }

        function renderBlacklist() {
            const container = document.getElementById('blacklist-list');
            if(GLOBAL_BLACKLIST.length === 0) { container.innerHTML = '<div class="text-white/10 text-xs py-10">Firewall clear. No active blocks.</div>'; return; }
            container.innerHTML = GLOBAL_BLACKLIST.map(ip => `<div class="flex items-center justify-between p-5 border border-white/5 rounded-3xl"><div class="font-mono text-xs text-brand/60">${ip}</div><button onclick="removeBlacklist('${ip}')" class="text-[9px] font-black uppercase text-red-500/40 hover:text-red-500">Revoke Access</button></div>`).join('');
        }

        async function removeBlacklist(ip) {
            const token = localStorage.getItem('admin_token');
            try {
                const res = await fetch('/api/admin/blacklist/remove', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': token }, body: JSON.stringify({ ip }) });
                if(res.ok) { GLOBAL_BLACKLIST = GLOBAL_BLACKLIST.filter(i => i !== ip); renderBlacklist(); }
            } catch(e) {}
        }

        async function savePteroSettings(e) {
            const token = localStorage.getItem('admin_token');
            const btn = document.getElementById('btnSave');
            btn.disabled = true; btn.innerHTML = "COMMITTING...";
            const payload = {
                url: document.getElementById('ptero_url').value, key: document.getElementById('ptero_token').value, client_key: document.getElementById('ptero_client_token').value,
                smtp_user: document.getElementById('smtp_user').value, smtp_pass: document.getElementById('smtp_pass').value, smtp_from: document.getElementById('smtp_from').value,
                location: document.getElementById('ptero_location').value, nest: document.getElementById('ptero_nest').value, egg: document.getElementById('ptero_egg').value,
                do_token: document.getElementById('do_token').value, linode_token: document.getElementById('linode_token').value,
                stats_buyers: document.getElementById('stats_buyers').value, stats_earnings: document.getElementById('stats_earnings').value,
                blacklist: GLOBAL_BLACKLIST
            };
            try {
                const res = await fetch('/api/admin/settings', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': token }, body: JSON.stringify(payload) });
                if (res.ok) { showAlert("CORE_UPDATED", "All system registries have been synchronized."); }
                else { showAlert("AUTH_FAILED", "Verification token invalid."); }
            } catch (err) { showAlert("ERROR", "Communication breakdown."); }
            finally { btn.disabled = false; btn.innerHTML = "Commit Changes"; }
        }

        function showAlert(title, msg) { document.getElementById('alertTitle').innerText = title; document.getElementById('alertMsg').innerText = msg; document.getElementById('customAlertModal').classList.remove('opacity-0', 'pointer-events-none'); }
        function closeAlert() { document.getElementById('customAlertModal').classList.add('opacity-0', 'pointer-events-none'); }
        document.addEventListener('mousemove', e => { document.documentElement.style.setProperty('--mouse-x', `${(e.clientX / window.innerWidth) * 100}%`); document.documentElement.style.setProperty('--mouse-y', `${(e.clientY / window.innerHeight) * 100}%`); });
    </script>
</body>
</html>
