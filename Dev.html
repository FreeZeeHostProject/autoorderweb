<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center | FreeZeeHosting</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                    },
                    colors: { brand: '#00f2fe', dark: '#000000' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; color: #ffffff; overflow-x: hidden; position: relative; }
        .grid-bg-static { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.01) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.01) 1px, transparent 1px); background-size: 60px 60px; z-index: -2; }
        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px); background-size: 60px 60px; mask-image: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), black 0%, transparent 50%); -webkit-mask-image: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), black 0%, transparent 50%); z-index: -1; }
        .glow-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.05) 0%, transparent 50%); z-index: -1; }

        .glass-card {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.05); border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 2.5rem; box-shadow: 0 25px 80px rgba(0,0,0,0.8);
        }

        .custom-input {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            color: white; border-radius: 1.25rem; padding: 1.25rem; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
        }
        .custom-input:focus { border-color: #00f2fe; background: rgba(0, 242, 254, 0.05); outline: none; }

        .btn-brand {
            background: #fff; color: #000; font-weight: 800; transition: all 0.4s ease;
            box-shadow: 0 4px 20px rgba(255,255,255,0.1);
        }
        .btn-brand:hover { box-shadow: 0 0 40px rgba(0, 242, 254, 0.5); transform: translateY(-3px); }

        .tab-btn {
            opacity: 0.3; transition: all 0.4s; cursor: pointer; padding: 0.85rem 1.75rem; border-radius: 1.25rem;
            font-weight: 700; letter-spacing: 0.05em; font-size: 0.7rem; text-transform: uppercase;
        }
        .tab-btn.active { opacity: 1; background: rgba(255, 255, 255, 0.05); color: #00f2fe; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeSlide 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .gateway-card {
            border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02);
            transition: all 0.3s ease; cursor: pointer;
        }
        .gateway-radio:checked + .gateway-card { border-color: #00f2fe; background: rgba(0, 242, 254, 0.1); }

        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url("https://grainy-gradients.vercel.app/noise.svg"); opacity: 0.03; pointer-events: none; z-index: 99; }
    </style>
</head>
<body class="antialiased">

    <div class="grid-bg-static"></div>
    <div class="grid-bg"></div>
    <div class="glow-overlay"></div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center px-6 relative z-50">
        <div class="w-full max-w-md p-12 glass-card text-center" data-aos="zoom-in">
            <div class="w-20 h-20 bg-white/5 rounded-3xl flex items-center justify-center mx-auto mb-10 border border-white/10">
                <i class="fa-solid fa-snowflake text-brand text-3xl animate-spin-slow"></i>
            </div>
            <h1 class="font-display text-3xl font-extrabold mb-3 text-white">Access Control</h1>
            <div class="space-y-6 text-left mt-10">
                <input type="text" id="devUser" class="custom-input w-full" placeholder="Admin ID">
                <input type="password" id="devPassword" class="custom-input w-full" placeholder="Access Key">
                <button onclick="loginDev()" id="btnLogin" class="w-full btn-brand py-5 rounded-2xl text-[10px] uppercase tracking-[0.2em] mt-6">Authorize Session</button>
            </div>
        </div>
    </div>

    <!-- ADMIN CONTENT -->
    <div id="adminContentWrapper" class="hidden opacity-0 transition-all duration-700 pt-32 pb-48 px-6">
        <div class="max-w-5xl mx-auto">
            
            <header class="text-center mb-20">
                <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-12 text-white text-center">Command <span class="text-brand">Center.</span></h1>
                <div class="flex flex-wrap items-center justify-center gap-2 md:gap-4 mb-16 px-4 py-2 bg-white/5 rounded-[1.5rem] w-fit mx-auto border border-white/5">
                    <button onclick="switchTab('stats')" id="tab-stats" class="tab-btn active">Stats</button>
                    <button onclick="switchTab('ptero')" id="tab-ptero" class="tab-btn">Pterodactyl</button>
                    <button onclick="switchTab('gateway')" id="tab-gateway" class="tab-btn text-brand">Gateway</button>
                    <button onclick="switchTab('vps')" id="tab-vps" class="tab-btn">VPS</button>
                    <button onclick="switchTab('smtp')" id="tab-smtp" class="tab-btn">Email</button>
                    <button onclick="switchTab('blacklist')" id="tab-blacklist" class="tab-btn text-red-400/60">Blacklist</button>
                    <button onclick="logoutDev()" class="ml-4 text-[10px] font-bold text-white/20 hover:text-red-500 transition-all uppercase px-2">Exit</button>
                </div>
            </header>

            <div class="glass-card p-10 md:p-16 mb-16 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-brand/30 to-transparent"></div>

                <!-- TAB: STATISTICS -->
                <div id="content-stats" class="tab-content active space-y-12">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 text-center">
                        <div class="space-y-4"><label class="text-[10px] font-black text-brand uppercase tracking-widest block">Total Buyers</label><input type="number" id="stats_buyers" class="custom-input w-full font-extrabold text-4xl text-center"></div>
                        <div class="space-y-4"><label class="text-[10px] font-black text-brand uppercase tracking-widest block">Net Revenue (IDR)</label><input type="number" id="stats_earnings" class="custom-input w-full font-extrabold text-4xl text-center"></div>
                    </div>
                    <div class="space-y-4 text-center"><label class="text-[10px] font-black text-brand uppercase tracking-widest block">Total Visitors</label><input type="number" id="stats_visitors" class="custom-input w-full max-w-xs mx-auto font-extrabold text-4xl text-center"></div>
                </div>

                <!-- TAB: PTERODACTYL -->
                <div id="content-ptero" class="tab-content space-y-10 text-left">
                    <div class="space-y-6">
                        <div><label class="text-[10px] font-black text-white/30 uppercase ml-4">API URL</label><input type="text" id="ptero_url" class="custom-input w-full font-bold"></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div><label class="text-[10px] font-black text-white/30 uppercase ml-4">PTLA Token</label><input type="password" id="ptero_token" class="custom-input w-full"></div>
                            <div><label class="text-[10px] font-black text-white/30 uppercase ml-4">PTLC Token</label><input type="password" id="ptero_client_token" class="custom-input w-full"></div>
                        </div>
                        <div class="grid grid-cols-3 gap-4 bg-white/5 p-8 rounded-[2rem]">
                            <div class="text-center"><label class="text-[9px] text-white/30 uppercase font-black block mb-3">LOC_ID</label><input type="number" id="ptero_location" class="custom-input w-full text-center text-xl font-black"></div>
                            <div class="text-center"><label class="text-[9px] text-white/30 uppercase font-black block mb-3">NEST_ID</label><input type="number" id="ptero_nest" class="custom-input w-full text-center text-xl font-black"></div>
                            <div class="text-center"><label class="text-[9px] text-white/30 uppercase font-black block mb-3">EGG_ID</label><input type="number" id="ptero_egg" class="custom-input w-full text-center text-xl font-black"></div>
                        </div>
                    </div>
                </div>

                <!-- TAB: GATEWAY SETTINGS -->
                <div id="content-gateway" class="tab-content space-y-12">
                    <h3 class="text-xl font-bold mb-8 text-center"><i class="fa-solid fa-credit-card text-brand"></i> Payment Gateway Selector</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                        <label class="block">
                            <input type="radio" name="active_gateway" value="pakasir" class="hidden gateway-radio">
                            <div class="gateway-card p-6 rounded-3xl text-center h-full flex flex-col items-center justify-center">
                                <i class="fa-solid fa-bolt text-brand text-2xl mb-3"></i>
                                <div class="font-bold text-sm">Pakasir</div>
                                <div class="text-[9px] text-white/30 uppercase mt-1">Direct to Bank</div>
                            </div>
                        </label>
                        <label class="block">
                            <input type="radio" name="active_gateway" value="orderkuota" class="hidden gateway-radio">
                            <div class="gateway-card p-6 rounded-3xl text-center h-full flex flex-col items-center justify-center">
                                <i class="fa-solid fa-mobile-screen text-emerald-400 text-2xl mb-3"></i>
                                <div class="font-bold text-sm">Order Kuota</div>
                                <div class="text-[9px] text-white/30 uppercase mt-1">OkeConnect API</div>
                            </div>
                        </label>
                        <label class="block">
                            <input type="radio" name="active_gateway" value="manual" class="hidden gateway-radio">
                            <div class="gateway-card p-6 rounded-3xl text-center h-full flex flex-col items-center justify-center">
                                <i class="fa-brands fa-whatsapp text-green-500 text-2xl mb-3"></i>
                                <div class="font-bold text-sm">Manual</div>
                                <div class="text-[9px] text-white/30 uppercase mt-1">WhatsApp Only</div>
                            </div>
                        </label>
                    </div>

                    <div class="space-y-8 text-left">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-4">
                                <h4 class="text-xs font-black uppercase tracking-widest text-white/20">Pakasir Settings</h4>
                                <input type="text" id="pakasir_slug" class="custom-input w-full" placeholder="Project Slug">
                                <input type="password" id="pakasir_key" class="custom-input w-full" placeholder="Pakasir API Key">
                            </div>
                            <div class="space-y-4">
                                <h4 class="text-xs font-black uppercase tracking-widest text-white/20">Order Kuota Settings</h4>
                                <input type="text" id="ok_merchant_code" class="custom-input w-full" placeholder="Merchant Code">
                                <input type="password" id="ok_api_key" class="custom-input w-full" placeholder="OkeConnect API Key">
                            </div>
                        </div>
                        <div class="space-y-4">
                            <h4 class="text-xs font-black uppercase tracking-widest text-white/20">WhatsApp Admin (Manual)</h4>
                            <input type="text" id="wa_admin" class="custom-input w-full" placeholder="6285xxxxxx">
                        </div>
                    </div>
                </div>

                <div id="content-vps" class="tab-content space-y-10 text-left">
                    <div class="space-y-6">
                        <div><label class="text-[10px] font-black text-white/30 uppercase ml-1">Digital Ocean Token</label><input type="password" id="do_token" class="custom-input w-full"></div>
                        <div><label class="text-[10px] font-black text-white/30 uppercase ml-1">Linode API Key</label><input type="password" id="linode_token" class="custom-input w-full"></div>
                    </div>
                </div>

                <div id="content-smtp" class="tab-content space-y-10 text-left">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="text-[10px] font-black text-white/30 uppercase ml-1">Email Account</label><input type="email" id="smtp_user" class="custom-input w-full"></div>
                        <div><label class="text-[10px] font-black text-white/30 uppercase ml-1">App Password</label><input type="password" id="smtp_pass" class="custom-input w-full"></div>
                        <div class="md:col-span-2"><label class="text-[10px] font-black text-white/30 uppercase ml-1">Sender Name</label><input type="text" id="smtp_from" class="custom-input w-full"></div>
                    </div>
                </div>

                <div id="content-blacklist" class="tab-content space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="blacklist-list"></div>
                </div>
            </div>

            <div class="text-center">
                <button onclick="savePteroSettings(event)" id="btnSave" class="btn-brand px-24 py-6 rounded-2xl text-[10px] font-black uppercase tracking-[0.3em]">Commit All Changes</button>
            </div>

        </div>
    </div>

    <!-- MODAL -->
    <div id="customAlertModal" class="fixed inset-0 z-[100] flex items-center justify-center px-6 opacity-0 pointer-events-none transition-all duration-500"><div class="absolute inset-0 bg-black/95 backdrop-blur-md"></div><div class="relative text-center max-w-sm glass-card p-10"><h3 id="alertTitle" class="text-2xl font-extrabold mb-4 tracking-tighter text-white"></h3><p id="alertMsg" class="text-white/40 text-xs mb-8 leading-relaxed"></p><button onclick="closeAlert()" class="w-full py-4 bg-brand text-black font-black rounded-xl text-[10px] uppercase tracking-widest shadow-lg">OKE</button></div></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, duration: 1000 });
        let GLOBAL_BLACKLIST = [];

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('content-' + t).classList.add('active');
            document.getElementById('tab-' + t).classList.add('active');
            if(t === 'blacklist') renderBlacklist();
        }

        async function loginDev() {
            const user = document.getElementById('devUser').value;
            const pass = document.getElementById('devPassword').value;
            const btn = document.getElementById('btnLogin');
            btn.disabled = true; btn.innerHTML = "VERIFYING...";
            try {
                const res = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user, pass }) });
                const data = await res.json();
                if (data.status === 'success') { localStorage.setItem('admin_token', data.token); showAdminPanel(); }
                else { showAlert("Access Denied", "Invalid admin credentials."); }
            } catch (e) { showAlert("Error", "Backend offline."); }
            finally { btn.disabled = false; btn.innerHTML = "Unlock Access"; }
        }

        async function showAdminPanel() {
            const token = localStorage.getItem('admin_token');
            if(!token) return;
            document.getElementById('loginScreen').classList.add('hidden');
            const wrap = document.getElementById('adminContentWrapper');
            wrap.classList.remove('hidden');
            setTimeout(() => wrap.classList.add('opacity-100'), 100);
            try {
                const res = await fetch('/api/admin/config', { headers: { 'Authorization': token } });
                const data = await res.json();
                if (data.config) {
                    document.getElementById('ptero_url').value = data.config.url || '';
                    document.getElementById('ptero_token').value = data.config.key || '';
                    document.getElementById('ptero_client_token').value = data.config.client_key || '';
                    document.getElementById('smtp_user').value = data.config.smtp_user || '';
                    document.getElementById('smtp_pass').value = data.config.smtp_pass || '';
                    document.getElementById('smtp_from').value = data.config.smtp_from || '';
                    document.getElementById('ptero_location').value = data.config.location || 1;
                    document.getElementById('ptero_nest').value = data.config.nest || 1;
                    document.getElementById('ptero_egg').value = data.config.egg || 15;
                    document.getElementById('do_token').value = data.config.do_token || '';
                    document.getElementById('linode_token').value = data.config.linode_token || '';
                    document.getElementById('stats_buyers').value = data.stats.totalBuyers || 0;
                    document.getElementById('stats_earnings').value = data.stats.totalEarnings || 0;
                    document.getElementById('stats_visitors').value = data.stats.totalVisitors || 0;
                    GLOBAL_BLACKLIST = data.config.blacklist || [];
                    
                    // Gateway values
                    document.querySelector(`input[name="active_gateway"][value="${data.config.active_gateway || 'manual'}"]`).checked = true;
                    document.getElementById('pakasir_slug').value = data.config.pakasir_slug || '';
                    document.getElementById('pakasir_key').value = data.config.pakasir_key || '';
                    document.getElementById('ok_merchant_code').value = data.config.ok_merchant_code || '';
                    document.getElementById('ok_api_key').value = data.config.ok_api_key || '';
                    document.getElementById('wa_admin').value = data.config.wa_admin || '';
                }
            } catch(e) {}
        }

        function renderBlacklist() {
            const container = document.getElementById('blacklist-list');
            if(GLOBAL_BLACKLIST.length === 0) { container.innerHTML = '<div class="text-white/10 text-xs py-10 text-center">Firewall clear.</div>'; return; }
            container.innerHTML = GLOBAL_BLACKLIST.map(ip => `<div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5"><div class="font-mono text-xs text-white/60">${ip}</div><button onclick="removeBlacklist('${ip}')" class="text-[9px] font-black uppercase text-red-500 hover:text-red-400">Remove</button></div>`).join('');
        }

        async function removeBlacklist(ip) {
            const token = localStorage.getItem('admin_token');
            try {
                const res = await fetch('/api/admin/blacklist/remove', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': token }, body: JSON.stringify({ ip }) });
                if(res.ok) { GLOBAL_BLACKLIST = GLOBAL_BLACKLIST.filter(i => i !== ip); renderBlacklist(); }
            } catch(e) {}
        }

        async function savePteroSettings(e) {
            const token = localStorage.getItem('admin_token');
            const btn = document.getElementById('btnSave');
            btn.disabled = true; btn.innerHTML = "COMMITTING...";
            const payload = {
                url: document.getElementById('ptero_url').value, key: document.getElementById('ptero_token').value, client_key: document.getElementById('ptero_client_token').value,
                smtp_user: document.getElementById('smtp_user').value, smtp_pass: document.getElementById('smtp_pass').value, smtp_from: document.getElementById('smtp_from').value,
                location: document.getElementById('ptero_location').value, nest: document.getElementById('ptero_nest').value, egg: document.getElementById('ptero_egg').value,
                do_token: document.getElementById('do_token').value, linode_token: document.getElementById('linode_token').value,
                stats_buyers: document.getElementById('stats_buyers').value, stats_earnings: document.getElementById('stats_earnings').value,
                stats_visitors: document.getElementById('stats_visitors').value,
                blacklist: GLOBAL_BLACKLIST,
                // Gateway
                active_gateway: document.querySelector('input[name="active_gateway"]:checked').value,
                pakasir_slug: document.getElementById('pakasir_slug').value,
                pakasir_key: document.getElementById('pakasir_key').value,
                ok_merchant_code: document.getElementById('ok_merchant_code').value,
                ok_api_key: document.getElementById('ok_api_key').value,
                wa_admin: document.getElementById('wa_admin').value
            };
            try {
                const res = await fetch('/api/admin/settings', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': token }, body: JSON.stringify(payload) });
                if (res.ok) { showAlert("System Updated", "All configurations synchronized."); }
                else { showAlert("Error", "Unauthorized."); }
            } catch (err) { showAlert("Error", "Comm fail."); }
            finally { btn.disabled = false; btn.innerHTML = "Commit All Changes"; }
        }

        function showAlert(title, msg) { document.getElementById('alertTitle').innerText = title; document.getElementById('alertMsg').innerText = msg; document.getElementById('customAlertModal').classList.remove('opacity-0', 'pointer-events-none'); }
        function closeAlert() { document.getElementById('customAlertModal').classList.add('opacity-0', 'pointer-events-none'); }
        document.addEventListener('mousemove', e => { document.documentElement.style.setProperty('--mouse-x', `${(e.clientX / window.innerWidth) * 100}%`); document.documentElement.style.setProperty('--mouse-y', `${(e.clientY / window.innerHeight) * 100}%`); });
    </script>
</body>
</html>
